<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Bigotes F.C. — Dashboard Deportivo</title>
<meta name="description" content="Dashboard deportivo de Los Bigotes F.C. — Convocatorias, alineaciones, goleadores y estadísticas del club.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E222E">
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<!-- SheetJS: lee datos.xlsx en el navegador (modo archivo manual) -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
/* ============================================================
   LOS BIGOTES F.C. — Identidad visual
   Superficie dominante: azul petróleo (color de club).
   Dorado solo como acento heráldico: nombre del club, pestaña
   activa, MVP, primer puesto. Sin glows, sin neón.
   ============================================================ */
:root {
  --color-primary:    #1B3A4B;  /* Azul petróleo */
  --color-secondary:  #8B1A1A;  /* Rojo vino */
  --color-gold:       #C9A84C;  /* Dorado */
  --color-black:      #0A0A0A;
  --color-parchment:  #E8D5A3;  /* Pergamino */
  --color-text-light: #F0E6CC;  /* Texto sobre oscuro */

  /* Derivados de superficie (todos tintados al azul petróleo) */
  --bg:        #0E222E;
  --surface:   #16303F;
  --surface-2: #1C3A4B;
  --azul-team: #24506A;  /* bloque del Equipo Azul, distinguible del fondo */
  --azul-chip: #4E8CAC;  /* texto/markers del Azul sobre oscuro */
  --rojo-chip: #C45050;  /* texto/markers del Rojo sobre oscuro */
  --line:      rgba(232, 213, 163, .14);
  --text-dim:  rgba(240, 230, 204, .62);

  --font-title: 'Cinzel', serif;
  --font-body:  'Lora', serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--color-text-light);
  font-family: var(--font-body);
  min-height: 100vh;
  line-height: 1.55;
  overscroll-behavior-x: none;
}

/* ---------- Header: franja de club ---------- */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .9rem;
  padding: 1.1rem 1rem 1rem;
  border-bottom: 2px solid var(--color-gold);
  background: var(--color-primary);
}
.crest { width: 64px; height: 64px; flex: 0 0 64px; display: block; object-fit: contain; }
.club-id { text-align: left; }
h1 {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: clamp(1.15rem, 4.5vw, 1.7rem);
  letter-spacing: .1em;
  color: var(--color-gold);
  text-transform: uppercase;
  line-height: 1.15;
}
.club-sub {
  font-size: .8rem;
  color: var(--text-dim);
  margin-top: .1rem;
}


/* ---------- Navegación: pestañas con subrayado ---------- */
.nav-outer {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--color-primary);
  border-bottom: 1px solid var(--line);
}
.nav-outer::before, .nav-outer::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 3rem;
  pointer-events: none;
  transition: opacity .25s;
  z-index: 1;
}
.nav-outer::before {
  left: 0;
  background: linear-gradient(270deg, transparent, var(--color-primary) 85%);
  opacity: 0;
}
.nav-outer::after {
  right: 0;
  background: linear-gradient(90deg, transparent, var(--color-primary) 85%);
}
.nav-outer.nav-al-inicio::before { opacity: 0; }
.nav-outer:not(.nav-al-inicio)::before { opacity: 1; }
.nav-outer.nav-al-final::after { opacity: 0; }
nav {
  display: flex;
  overflow-x: auto;
  padding: 0 3rem 0 .5rem;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-dim);
  font-family: var(--font-title);
  font-size: .74rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: .85rem .8rem .7rem;
  cursor: pointer;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.tab:hover { color: var(--color-text-light); }
.tab.active { color: var(--color-gold); border-bottom-color: var(--color-gold); }

/* ---------- Layout ---------- */
main { max-width: 1100px; margin: 0 auto; padding: 1.4rem .9rem 3rem; min-height: 80vh; touch-action: pan-y; }
.view { display: none; animation: fadeIn .25s ease-out; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.view-title {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--color-text-light);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.view-sub {
  font-style: italic;
  color: var(--text-dim);
  font-size: .9rem;
  margin: .15rem 0 1.2rem;
}

/* ---------- Secciones y listas ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 6px;
}
.section-label {
  font-family: var(--font-title);
  font-size: .78rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--color-parchment);
  margin: 1.5rem 0 .6rem;
}
.section-label .count {
  color: var(--text-dim);
  font-family: var(--font-body);
  letter-spacing: 0;
  margin-left: .3rem;
}

/* ---------- Convocatoria: cuadrícula compacta ---------- */
.roster-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.roster-cell {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .5rem .6rem;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .15s;
  min-width: 0;
}
.roster-cell:nth-child(odd) { border-right: 1px solid var(--line); }
.roster-cell:hover { background: var(--surface-2); }
.roster-cell:nth-last-child(1), .roster-cell:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.roster-cell .avatar { width: 30px; height: 30px; flex: 0 0 30px; font-size: .6rem; }
.rc-info { min-width: 0; }
.rc-name {
  font-weight: 600;
  font-size: .84rem;
  color: var(--color-text-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rc-pos { font-size: .68rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Lista de espera: claramente "en reserva" */
.espera-card {
  background: transparent;
  border: 1px dashed rgba(232, 213, 163, .4);
}
.espera-row {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .45rem .7rem;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .15s;
}
.espera-row:last-child { border-bottom: none; }
.espera-row:hover { background: var(--surface-2); }
.espera-num {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .85rem;
  color: var(--text-dim);
  min-width: 1.4rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.espera-row .avatar {
  width: 30px; height: 30px; flex: 0 0 30px;
  font-size: .6rem;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-dim);
}
.espera-row .rc-name { color: var(--color-parchment); font-weight: 500; }

/* Resaltado del buscador en convocatoria */
.roster-cell.dimmed, .espera-row.dimmed { opacity: .3; }
.roster-cell.hit, .espera-row.hit { background: rgba(201, 168, 76, .15); }
.roster-cell.hit .avatar, .espera-row.hit .avatar {
  border: 1.5px solid var(--color-gold);
  box-shadow: 0 0 0 1.5px var(--color-gold);
  color: var(--color-text-light);
}
.roster-cell.hit .rc-name, .espera-row.hit .rc-name { color: var(--color-gold); font-weight: 700; }

/* ---------- Fila de jugador ---------- */
.player-row {
  display: flex; align-items: center; gap: .8rem;
  padding: .6rem .8rem;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .15s;
}
.player-row:last-child { border-bottom: none; }
.player-row:hover { background: var(--surface-2); }
.avatar {
  width: 40px; height: 40px;
  flex: 0 0 40px;
  border-radius: 50%;
  background: var(--azul-team);
  color: var(--color-text-light);
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .8rem;
  display: flex; align-items: center; justify-content: center;
}
.avatar.rojo { background: var(--color-secondary); }
.avatar.azul { background: var(--azul-team); }
.p-name { font-weight: 600; font-size: .96rem; color: var(--color-text-light); }
.p-pos  { font-size: .78rem; color: var(--text-dim); }
.p-info { flex: 1; min-width: 0; }
.p-stat {
  font-weight: 700;
  color: var(--color-text-light);
  font-size: 1.1rem;
  text-align: right;
  min-width: 2.6rem;
  font-variant-numeric: tabular-nums;
}
.p-stat small {
  display: block;
  font-weight: 400;
  font-size: .6rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .08em;
}

.badge {
  display: inline-block;
  font-family: var(--font-body);
  font-size: .64rem;
  font-weight: 700;
  letter-spacing: .06em;
  padding: .1rem .42rem;
  border-radius: 3px;
  background: rgba(232,213,163,.12);
  color: var(--color-parchment);
  margin-left: .4rem;
  vertical-align: middle;
  text-transform: uppercase;
}
.badge.mvp { background: var(--color-gold); color: var(--color-primary); }

.rank-num {
  font-weight: 700;
  font-size: .92rem;
  color: var(--text-dim);
  min-width: 1.7rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.rank-num.first { color: var(--color-gold); font-size: 1.05rem; }

/* ---------- Marcador (banner del último partido) ---------- */
.score-banner {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 1rem;
  text-align: center;
  margin-bottom: 1rem;
}
.score-banner .fecha { font-size: .82rem; color: var(--text-dim); margin-bottom: .5rem; }
.score-line {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: .9rem;
}
.score-team {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .95rem;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.score-team.rojo { color: var(--rojo-chip); }
.score-team.azul { color: var(--azul-chip); }
.score-nums {
  font-family: var(--font-title);
  font-weight: 900;
  font-size: 2.1rem;
  color: var(--color-text-light);
  font-variant-numeric: tabular-nums;
}

/* ---------- Alineación: cabecera de fecha y controles ---------- */
.ali-header { text-align: center; margin: .5rem 0 1rem; }
.ali-status {
  display: inline-block;
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .68rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  padding: .22rem .65rem;
  border-radius: 3px;
}
.ali-status.proximo { background: var(--color-gold); color: var(--color-primary); }
.ali-status.pasado { background: rgba(232,213,163,.16); color: var(--color-parchment); }
.ali-status.conv { background: transparent; color: var(--color-gold); border: 1.5px solid var(--color-gold); }
#conv-fecha { font-size: clamp(.85rem, 3vw, 1rem); color: var(--text-dim); margin-top: .2rem; }
.conv-desc { font-size: clamp(1rem, 4vw, 1.35rem); color: var(--color-text-light); font-family: var(--font-title); font-weight: 700; margin-top: .3rem; }
.ali-fecha {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: clamp(1.25rem, 5.5vw, 1.8rem);
  color: var(--color-text-light);
  letter-spacing: .04em;
  margin-top: .35rem;
  line-height: 1.2;
}
.ali-note { font-size: .84rem; font-style: italic; color: var(--text-dim); margin-top: .35rem; }
.ali-controls { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: .8rem; }
.ali-controls input {
  flex: 1 1 12rem;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--color-text-light);
  font-family: var(--font-body);
  font-size: .9rem;
  padding: .55rem .7rem;
  border-radius: 5px;
}
.ali-controls input:focus {
  outline: none;
  border-color: var(--color-gold);
}
.ali-controls input::placeholder { color: var(--text-dim); }

/* Selector de fechas custom (reemplaza el <select> nativo) */
.cs-wrap { position: relative; flex: 1 1 12rem; }
.cs-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .4rem;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--color-text-light);
  font-family: var(--font-body);
  font-size: .9rem;
  padding: .55rem .7rem;
  border-radius: 5px;
  cursor: pointer;
  text-align: left;
  transition: border-color .15s;
}
.cs-btn:focus, .cs-btn.open { outline: none; border-color: var(--color-gold); }
.cs-arrow { font-size: 1rem; line-height: 1; color: var(--text-dim); flex-shrink: 0; transition: transform .2s, color .15s; }
.cs-btn.open .cs-arrow { transform: rotate(180deg); color: var(--color-gold); }
.cs-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cs-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  z-index: 60;
  background: var(--surface-2);
  border: 1px solid var(--color-gold);
  border-radius: 6px;
  max-height: 240px;
  overflow-y: auto;
  box-shadow: 0 10px 24px rgba(0,0,0,.55);
  display: none;
}
.cs-list.open { display: block; }
.cs-item {
  padding: .5rem .8rem;
  font-size: .9rem;
  color: var(--color-text-light);
  cursor: pointer;
  border-bottom: 1px solid var(--line);
}
.cs-item:last-child { border-bottom: none; }
.cs-item:hover { background: rgba(201,168,76,.15); color: var(--color-gold); }
.cs-item.selected { color: var(--color-gold); font-weight: 600; }

/* Autocompletado propio: la lista vive dentro de la página, con el estilo del sitio */
.autocomplete { position: relative; flex: 1 1 12rem; display: flex; }
.autocomplete input { width: 100%; padding-right: 2.2rem; }
.ac-toggle {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 2.2rem;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .15s, transform .2s;
}
.ac-toggle:hover { color: var(--color-gold); }
.ac-toggle.open { transform: rotate(180deg); color: var(--color-gold); }
.ac-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  z-index: 60;
  background: var(--surface-2);
  border: 1px solid var(--color-gold);
  border-radius: 6px;
  max-height: 240px;
  overflow-y: auto;
  box-shadow: 0 10px 24px rgba(0, 0, 0, .55);
  display: none;
}
.ac-list.open { display: block; }
.ac-item {
  padding: .5rem .8rem;
  font-size: .9rem;
  color: var(--color-text-light);
  cursor: pointer;
  border-bottom: 1px solid var(--line);
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: rgba(201, 168, 76, .15); color: var(--color-gold); }
.pitch-player.dimmed { opacity: .3; }
.pitch-player.ausente { opacity: .65; filter: grayscale(.9); }
.pitch-player.ausente .avatar { border-style: dashed; border-color: rgba(240,230,204,.5); background: rgba(20,40,55,.7) !important; }
.pitch-player.ausente .pp-name { color: var(--text-dim); }
.pitch-player.hit .avatar {
  border-color: var(--color-gold);
  box-shadow: 0 0 0 2px var(--color-gold);
}
.pitch-player.hit .pp-name { background: var(--color-gold); color: var(--color-primary); font-weight: 700; }

/* ---------- Alineación: cancha de fútbol ---------- */
.versus-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
.team-card { overflow: hidden; }
.team-head {
  font-family: var(--font-title);
  font-weight: 700;
  text-align: center;
  letter-spacing: .18em;
  text-transform: uppercase;
  font-size: .88rem;
  padding: .6rem;
  color: var(--color-text-light);
}
.team-head.rojo { background: var(--color-secondary); }
.team-head.azul { background: var(--azul-team); }

/* Media cancha vertical: ataque hacia arriba, arquero abajo.
   Franjas de césped en el color del equipo. */
.pitch { position: relative; padding: 1rem .35rem .8rem; }
.pitch.rojo { background: repeating-linear-gradient(180deg, #5C1414 0 54px, #521111 54px 108px); }
.pitch.azul { background: repeating-linear-gradient(180deg, #1E4459 0 54px, #1A3C50 54px 108px); }
.pl-outer, .pl-circle, .pl-box, .pl-box-in {
  position: absolute;
  border: 1.5px solid rgba(240, 230, 204, .28);
  pointer-events: none;
}
.pl-outer { inset: 7px; }
.pl-circle {
  top: 7px; left: 50%;
  transform: translateX(-50%);
  width: 96px; height: 48px;
  border-top: none;
  border-radius: 0 0 96px 96px;
}
.pl-box {
  bottom: 7px; left: 50%;
  transform: translateX(-50%);
  width: 60%; height: 62px;
  border-bottom: none;
}
.pl-box-in {
  bottom: 7px; left: 50%;
  transform: translateX(-50%);
  width: 30%; height: 26px;
  border-bottom: none;
}
.pitch-rows {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: .7rem;
  min-height: 420px;
}
.p-line { display: flex; justify-content: space-evenly; align-items: flex-start; }
.pitch-player {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .18rem;
  cursor: pointer;
  width: 25%;
  max-width: 80px;
  position: relative;
}
.pitch-player .avatar {
  width: 38px; height: 38px;
  flex: 0 0 auto;
  border: 1.5px solid rgba(232, 213, 163, .55);
  font-size: .72rem;
}
.pitch-player.is-mvp .avatar {
  border-color: var(--color-gold);
  box-shadow: 0 0 0 1.5px var(--color-gold);
}
.pp-name {
  font-size: .62rem;
  color: var(--color-text-light);
  background: rgba(8, 18, 26, .5);
  padding: .1rem .32rem;
  border-radius: 3px;
  max-width: 100%;
  text-align: center;
  line-height: 1.25;
}
.pp-name .n-nombre, .pod-name .n-nombre { display: block; white-space: nowrap; }
.pp-name .n-ape, .pod-name .n-ape { display: block; white-space: nowrap; }
.pp-pos-badge {
  font-size: .5rem;
  color: var(--text-dim);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  margin-top: .1rem;
}
.cap-corona-svg {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 20px;
  pointer-events: none;
}
.pitch-player.is-capitan .avatar {
  border: 2.5px solid var(--color-gold);
  box-shadow: 0 0 0 1px var(--color-gold);
}
.avatar.portero { background: #1e5228; }

/* ---------- Estadísticas: hub de categorías ---------- */
.stats-hub { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: .85rem .8rem;
  cursor: pointer;
  transition: border-color .2s, background .15s;
}
.stat-card:hover { border-color: var(--acc, var(--color-gold)); background: var(--surface-2); }
.sc-title {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .7rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--color-parchment);
}
.sc-value {
  font-family: var(--font-title);
  font-weight: 900;
  font-size: 1.8rem;
  color: var(--acc, var(--color-gold));
  margin-top: .35rem;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.sc-value small {
  display: block;
  font-family: var(--font-body);
  font-weight: 400;
  font-size: .62rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: .2rem;
}
.sc-leader { display: flex; align-items: center; gap: .45rem; margin-top: .6rem; }

// Índice de jugadores; se reconstruye cuando llegan datos reales.
// Todos los IDs internos son STRINGS (los reales son tipo "J01").
let byId = {};
function indexarJugadores() {
  byId = Object.fromEntries(MOCK_DATA.jugadores.map(j => [j.ID_Jugador, j]));
}

// Los IDs del mock son numéricos: se convierten a string una sola vez
// para que todo el código compare siempre string === string.
function normalizarIdsMock() {
  MOCK_DATA.jugadores.forEach(j => { j.ID_Jugador = String(j.ID_Jugador); });
  MOCK_DATA.partidos.forEach(p => {
    p.ID_Partido = String(p.ID_Partido);
    if (p.MVP != null) p.MVP = (Array.isArray(p.MVP) ? p.MVP : [p.MVP]).map(String);
    if (p.Diferenciador != null) p.Diferenciador = String(p.Diferenciador);
  });
  MOCK_DATA.alineaciones.forEach(a => {
    a.ID_Partido = String(a.ID_Partido);
    a.Rojo = a.Rojo.map(String);
    a.Azul = a.Azul.map(String);
    a.Parciales = (a.Parciales || []).map(String);
  });
  MOCK_DATA.eventos.forEach(e => {
    e.ID_Partido = String(e.ID_Partido);
    e.Goleador = String(e.Goleador);
    if (e.Asistente != null) e.Asistente = String(e.Asistente);
  });
  MOCK_DATA.asignacionPagos.forEach(p => { p.ID_Jugador = String(p.ID_Jugador); });
  (MOCK_DATA.asistencia || []).forEach(a => {
    a.ID_Jugador = String(a.ID_Jugador);
    a.ID_Partido = String(a.ID_Partido);
  });
}

function nombre(id) { return byId[id] ? byId[id].Nombre : "—"; }

// Cruce por nombre: los IDs de Finanzas y Estadísticas son numeraciones
// INDEPENDIENTES (J15 es una persona distinta en cada archivo), así que
// la Convocatoria enlaza al perfil buscando el nombre en Jugadores.
function idPorNombre(nombreBuscado) {
  const q = normalizar(String(nombreBuscado));
  const j = MOCK_DATA.jugadores.find(j => normalizar(j.Nombre) === q);
  return j ? j.ID_Jugador : null;
}
function posicion(id) { return byId[id] ? byId[id].Posicion : ""; }
function iniciales(n) {
  return n.split(" ").map(p => p[0]).slice(0, 2).join("").toUpperCase();
}
function fmtFecha(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const date = new Date(y, m - 1, d);
  return `${dias[date.getDay()]} ${d} de ${meses[m - 1]} de ${y}`;
}
function fmtFechaCorta(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${d} ${meses[m - 1]} ${y}`;
}

// Un partido está jugado cuando tiene resultado; el próximo aún no lo tiene
function esJugado(p) { return p.Goles_Rojo != null && p.Goles_Azul != null; }

// El MVP puede ser uno o varios: acepta número o lista en el campo MVP
function mvpsDe(p) {
  if (p.MVP == null) return [];
  return Array.isArray(p.MVP) ? p.MVP : [p.MVP];
}

// Autogol con tolerancia a mayúsculas/tildes
function esAutogol(e) { return normalizar(String(e.Tipo_Gol)) === "autogol"; }

// Comparación de nombres sin acentos ni mayúsculas
function normalizar(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// Autocompletado propio (el datalist nativo no se puede estilizar).
// Cada input toma sus sugerencias de FUENTES_AC[id], que las vistas
// actualizan al renderizar. Soporta flechas, Enter, Escape y click.
const FUENTES_AC = {};

function initAutocomplete(id) {
  const input = document.getElementById(id);
  const lista = document.getElementById(id + "-ac");
  let activo = -1;

  // Botón toggle (flecha) inyectado dinámicamente
  const toggle = document.createElement("button");
  toggle.type = "button";
  toggle.className = "ac-toggle";
  toggle.setAttribute("aria-label", "Desplegar opciones");
  toggle.textContent = "▼";
  input.parentElement.insertBefore(toggle, lista);

  function abrir() {
    const q = normalizar(input.value.trim());
    const nombres = (FUENTES_AC[id] || []).filter(n => !q || normalizar(n).includes(q));
    if (!nombres.length) { cerrar(); return; }
    lista.innerHTML = nombres.map(n => `<div class="ac-item">${n}</div>`).join("");
    lista.classList.add("open");
    toggle.classList.add("open");
    activo = -1;
  }
  function cerrar() {
    lista.classList.remove("open");
    toggle.classList.remove("open");
    activo = -1;
  }
  let ignorarAbrir = false;

  function elegir(n) {
    input.value = n;
    ignorarAbrir = true;
    input.dispatchEvent(new Event("input")); // resalta sin reabrir dropdown
    cerrar();
    input.blur(); // cierra teclado en móvil
    setTimeout(() => {
      ignorarAbrir = false;
      // reposiciona al jugador tras cerrar el teclado
      const hit = document.querySelector(".pitch-player.hit, .roster-cell.hit, .espera-row.hit");
      if (hit) hit.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 350);
  }

  toggle.addEventListener("mousedown", e => {
    e.preventDefault();
    if (lista.classList.contains("open")) { cerrar(); }
    else { abrir(); input.focus(); }
  });

  input.addEventListener("focus", abrir);
  input.addEventListener("input", () => { if (!ignorarAbrir) abrir(); });
  input.addEventListener("blur", () => setTimeout(cerrar, 120));
  input.addEventListener("keydown", e => {
    // Sostener Backspace → borrar todo de una vez
    if (e.key === "Backspace" && e.repeat) {
      e.preventDefault();
      input.value = "";
      input.dispatchEvent(new Event("input"));
      return;
    }
    const items = [...lista.querySelectorAll(".ac-item")];
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      if (!lista.classList.contains("open")) { abrir(); return; }
      activo = e.key === "ArrowDown"
        ? Math.min(activo + 1, items.length - 1)
        : Math.max(activo - 1, 0);
      items.forEach((el, i) => el.classList.toggle("active", i === activo));
      if (items[activo]) items[activo].scrollIntoView({ block: "nearest" });
      e.preventDefault();
    } else if (e.key === "Enter") {
      if (activo >= 0 && items[activo]) { elegir(items[activo].textContent); e.preventDefault(); }
      else cerrar();
    } else if (e.key === "Escape") {
      cerrar();
    }
  });
  lista.addEventListener("mousedown", e => {
    const item = e.target.closest(".ac-item");
    if (item) { e.preventDefault(); elegir(item.textContent); }
  });
}

// Resalta en las celdas dadas a los jugadores cuyo nombre coincide con lo
// escrito; atenúa el resto y hace scroll hasta el primero. Vacío = limpiar.
function resaltarPorNombre(texto, celdas) {
  const q = normalizar(texto.trim());
  celdas.forEach(c => c.classList.remove("hit", "dimmed"));
  if (!q) return;
  let primero = null;
  celdas.forEach(c => {
    const nombreCelda = c.dataset.nombre || nombre(c.dataset.id);
    const coincide = normalizar(nombreCelda).includes(q);
    c.classList.add(coincide ? "hit" : "dimmed");
    if (coincide && !primero) primero = c;
  });
  if (primero) primero.scrollIntoView({ behavior: "instant", block: "center" });
}

// Estadísticas agregadas por jugador (derivadas, nunca hardcodeadas).
// Solo cuentan los partidos ya jugados — la alineación futura no suma.
function statsJugador(id) {
  const goles = MOCK_DATA.eventos.filter(e => e.Goleador === id && !esAutogol(e)).length;
  const asistencias = MOCK_DATA.eventos.filter(e => e.Asistente === id).length;
  const idsJugados = new Set(MOCK_DATA.partidos.filter(esJugado).map(p => p.ID_Partido));
  let jugados = 0, vecesRojo = 0, vecesAzul = 0;
  MOCK_DATA.alineaciones.forEach(a => {
    if (!idsJugados.has(a.ID_Partido)) return;
    if (a.Rojo.includes(id)) { jugados++; vecesRojo++; }
    if (a.Azul.includes(id)) { jugados++; vecesAzul++; }
  });
  const mvps = MOCK_DATA.partidos.filter(p => mvpsDe(p).includes(id)).length;
  const difs = MOCK_DATA.partidos.filter(p => p.Diferenciador === id).length;
  const total = idsJugados.size;
  const pct = total > 0 ? Math.round((jugados / total) * 100) : 0;
  let ganados = 0, perdidos = 0;
  MOCK_DATA.alineaciones.forEach(a => {
    if (!idsJugados.has(a.ID_Partido)) return;
    const p = MOCK_DATA.partidos.find(p => p.ID_Partido === a.ID_Partido);
    if (!p || p.Goles_Rojo === p.Goles_Azul) return;
    const equipo = a.Rojo.includes(id) ? "Rojo" : a.Azul.includes(id) ? "Azul" : null;
    if (!equipo) return;
    const gana = p.Goles_Rojo > p.Goles_Azul ? "Rojo" : "Azul";
    if (equipo === gana) ganados++; else perdidos++;
  });
  // Tipo de gol más frecuente
  const tipos = {};
  MOCK_DATA.eventos.filter(e => e.Goleador === id && !esAutogol(e))
    .forEach(e => { tipos[e.Tipo_Gol] = (tipos[e.Tipo_Gol] || 0) + 1; });
  const tipoDestacado = Object.entries(tipos).sort((a, b) => b[1] - a[1])[0];
  const equipoFrecuente = vecesRojo === vecesAzul ? "Equilibrado" : (vecesRojo > vecesAzul ? "Rojo" : "Azul");
  return { goles, asistencias, jugados, ganados, perdidos, pct, mvps, difs,
           tipoDestacado: tipoDestacado ? tipoDestacado[0] : "—", equipoFrecuente };
}

/* ============================================================
   PILARES — Sistema Acumulativo Aprobado (jun-2026)
   PO · VJ · PD: acumulan partido a partido. Temporada = SUMA.
   Fair Play: porcentaje por partido. Temporada = PROMEDIO.
   ============================================================ */

const PESOS_TIPO_GOL = {
  "jugada": 1, "gol": 1, "penal": 1,
  "cabeza": 1.5,
  "tiro libre": 2, "fuera del area": 2, "olimpico": 2,
  "chilena": 3,
  "autogol": -1
};
const PESOS_TIPO_PASE = {
  "normal": 1,
  "tiro libre": 2, "esquina": 2,
  "porteria": 3
};
const COL = { victoria: 3, empate: 2, derrota: 1 };
const BONUS = { gv: 2, pgv: 2, gvCol: 2, mvp: 2 };
const FP_PESOS = { "Temprano": 100, "Tiempo": 85, "Tarde": 75, "No": 0, "Sancionado": 0 };

function eventosDelPartido(idPartido) {
  return MOCK_DATA.eventos
    .filter(e => e.ID_Partido === idPartido)
    .sort((a, b) => (a.Minuto || 0) - (b.Minuto || 0));
}

// Gol de la victoria: en un 4-3, el 4º gol del ganador (superó los 3 del rival)
function esGolVictoria(evento, p) {
  if (p.Goles_Rojo === p.Goles_Azul) return false;
  const ganador = p.Goles_Rojo > p.Goles_Azul ? "Rojo" : "Azul";
  if (evento.Equipo !== ganador) return false;
  const golesRival = ganador === "Rojo" ? p.Goles_Azul : p.Goles_Rojo;
  const golesGanador = eventosDelPartido(p.ID_Partido).filter(e => e.Equipo === ganador);
  return golesGanador[golesRival] === evento;
}

function resultadoColectivo(equipo, p) {
  if (p.Goles_Rojo === p.Goles_Azul) return COL.empate;
  const ganador = p.Goles_Rojo > p.Goles_Azul ? "Rojo" : "Azul";
  return equipo === ganador ? COL.victoria : COL.derrota;
}

function esParcial(id, ali) {
  return (ali.Parciales || []).includes(id);
}

function esDefOArquero(id) {
  const p = posicion(id);
  return p === "Arquero" || p === "Defensa";
}

function esMedio(id) {
  return posicion(id) === "Mediocampista";
}

function esPaseGolVictoria(e, p) {
  return !!e.Asistente && esGolVictoria(e, p);
}

function ratingDefensivo(equipo, p) {
  const concedidos = equipo === "Rojo" ? p.Goles_Azul : p.Goles_Rojo;
  if (p.Goles_Rojo === p.Goles_Azul) return Math.max(0, 10 - concedidos);
  const ganador = p.Goles_Rojo > p.Goles_Azul ? "Rojo" : "Azul";
  if (equipo === ganador) return Math.max(0, 10 - concedidos);
  // Perdedor: GDC + MGD
  const golesPerdedor = equipo === "Rojo" ? p.Goles_Rojo : p.Goles_Azul;
  const gdc = golesPerdedor + 1;
  const golesGanador = eventosDelPartido(p.ID_Partido)
    .filter(e => e.Equipo === ganador && !esAutogol(e));
  const gv = golesGanador[golesPerdedor];
  const mgd = gv ? (gv.Minuto || 90) : 90;
  return Math.max(1, Math.min(9, Math.round((mgd * 0.1 - gdc * 0.5) * 10) / 10));
}

function pilPO(id, p, ali) {
  const equipo = ali.Rojo.includes(id) ? "Rojo" : ali.Azul.includes(id) ? "Azul" : null;
  if (!equipo) return null;
  let pts = resultadoColectivo(equipo, p);
  eventosDelPartido(p.ID_Partido).forEach(e => {
    if (e.Goleador !== id || e.Equipo !== equipo) return;
    if (esAutogol(e)) { pts -= 1; return; }
    pts += PESOS_TIPO_GOL[normalizar(e.Tipo_Gol)] ?? 1;
    if (esGolVictoria(e, p)) pts += BONUS.gv;
  });
  if (mvpsDe(p).includes(id)) pts += BONUS.mvp;
  if (esParcial(id, ali)) pts *= 0.5;
  return Math.round(pts * 10) / 10;
}

function pilVJ(id, p, ali) {
  const equipo = ali.Rojo.includes(id) ? "Rojo" : ali.Azul.includes(id) ? "Azul" : null;
  if (!equipo) return null;
  let pts = resultadoColectivo(equipo, p);
  eventosDelPartido(p.ID_Partido).forEach(e => {
    if (e.Asistente !== id) return;
    pts += PESOS_TIPO_PASE[normalizar(e.Tipo_Pase || "normal")] ?? 1;
    if (esPaseGolVictoria(e, p)) pts += BONUS.pgv;
  });
  if (esMedio(id) && p.Goles_Rojo !== p.Goles_Azul) {
    const ganador = p.Goles_Rojo > p.Goles_Azul ? "Rojo" : "Azul";
    if (equipo === ganador) pts += BONUS.gvCol;
  }
  if (mvpsDe(p).includes(id)) pts += BONUS.mvp;
  if (esParcial(id, ali)) pts *= 0.5;
  return Math.round(pts * 10) / 10;
}

function pilPD(id, p, ali) {
  const equipo = ali.Rojo.includes(id) ? "Rojo" : ali.Azul.includes(id) ? "Azul" : null;
  if (!equipo) return null;
  let pts = resultadoColectivo(equipo, p);
  if (esDefOArquero(id)) {
    pts += ratingDefensivo(equipo, p);
    if (p.Goles_Rojo !== p.Goles_Azul) {
      const ganador = p.Goles_Rojo > p.Goles_Azul ? "Rojo" : "Azul";
      if (equipo === ganador) pts += BONUS.gvCol;
    }
  }
  if (mvpsDe(p).includes(id)) pts += BONUS.mvp;
  if (esParcial(id, ali)) pts *= 0.5;
  return Math.round(pts * 10) / 10;
}

function pilFP(id, p, ali) {
  const equipo = ali.Rojo.includes(id) ? "Rojo" : ali.Azul.includes(id) ? "Azul" : null;
  if (!equipo) return null;
  const reg = (MOCK_DATA.asistencia || []).find(a => a.ID_Jugador === id && a.ID_Partido === p.ID_Partido);
  return FP_PESOS[reg ? reg.Llegada : "Tiempo"] ?? 85;
}

function calcAcumulado(fn) {
  return function(id) {
    let total = 0;
    MOCK_DATA.alineaciones.forEach(a => {
      const p = MOCK_DATA.partidos.find(x => x.ID_Partido === a.ID_Partido);
      if (!p || !esJugado(p)) return;
      const v = fn(id, p, a);
      if (v !== null) total += v;
    });
    return Math.round(total * 10) / 10;
  };
}

function calcPromedio(fn) {
  return function(id) {
    let total = 0, count = 0;
    MOCK_DATA.alineaciones.forEach(a => {
      const p = MOCK_DATA.partidos.find(x => x.ID_Partido === a.ID_Partido);
      if (!p || !esJugado(p)) return;
      const v = fn(id, p, a);
      if (v !== null) { total += v; count++; }
    });
    return count > 0 ? Math.round(total / count) : 0;
  };
}

const poderOfensivo  = calcAcumulado(pilPO);
const visionDeJuego  = calcAcumulado(pilVJ);
const poderDefensivo = calcAcumulado(pilPD);
const fairPlay       = calcPromedio(pilFP);

const PILARES = [
  { nombre: "Poder Ofensivo",  calc: poderOfensivo,  listo: true, fmt: v => v + " pts" },
  { nombre: "Visión de Juego", calc: visionDeJuego,  listo: true, fmt: v => v + " pts" },
  { nombre: "Poder Defensivo", calc: poderDefensivo, listo: true, fmt: v => v + " pts" },
  { nombre: "Fair Play",       calc: fairPlay,       listo: true, fmt: v => v + "%" }
];

/* ============================================================
   RENDERIZADO DE VISTAS
   ============================================================ */
function avatarHTML(id, team) {

function playerRowHTML(id, extras) {

// Próximo domingo: si hoy ES domingo (partido en curso), devuelve el siguiente.
// La convocatoria solo es vigente Mon–Sat de la semana del partido.
function proximoDomingo() {
  const hoy = new Date();
  const dia = hoy.getDay(); // 0=dom, 1=lun ... 6=sab
  const dias = dia === 0 ? 7 : 7 - dia;
  const d = new Date(hoy);
  d.setDate(hoy.getDate() + dias);
  return fechaISO(d);
}

// ---- Vista 1: Convocatoria ----
function renderConvocatoria() {
  const domingo = proximoDomingo();
  const fechaFmt = fmtFecha(domingo);
  const fechaCap = fechaFmt.charAt(0).toUpperCase() + fechaFmt.slice(1);
  document.getElementById("conv-fecha").textContent = fechaCap;

  const TIPOS_PARTIDO = ["Convocado", "Lista de espera", "Partido"];
  const relevantes = MOCK_DATA.asignacionPagos.filter(p => TIPOS_PARTIDO.includes(p.Tipo_Asignacion));
  const deLaFecha = relevantes.filter(p => p.Fecha_Asignacion === domingo);

  // Sin datos para el próximo domingo → estado de espera
  if (deLaFecha.length === 0) {
    document.getElementById("conv-desc").textContent = "A la espera de convocatoria para el partido del:";
    document.getElementById("label-convocados").textContent = "";
    document.getElementById("lista-convocados").innerHTML = `<p class="empty-msg">La convocatoria será publicada próximamente.</p>`;
    document.getElementById("label-espera").innerHTML = "";
    document.getElementById("lista-espera").innerHTML = "";
    FUENTES_AC["conv-player"] = [];
    return;
  }

  // Hay datos → convocatoria vigente
  document.getElementById("conv-desc").textContent = "Jugadores convocados para el partido del:";
  // "Convocado" → en convocatoria; "Lista de espera" → reserva;
  // "Partido" → ya fue asignado a una alineación (sale de esta vista)
  const convocados = deLaFecha.filter(p => p.Tipo_Asignacion === "Convocado");
  const espera = deLaFecha.filter(p => p.Tipo_Asignacion === "Lista de espera");
  const yaAsignados = deLaFecha.filter(p => p.Tipo_Asignacion === "Partido");

  // Sugerencias del buscador: los nombres vienen de la propia fila de
  // Finanzas (sus IDs no son compatibles con los de Estadísticas)
  FUENTES_AC["conv-player"] = [...convocados, ...espera]
    .map(p => p.Nombre_Jugador)
    .sort((a, b) => a.localeCompare(b, "es"));

  document.getElementById("label-espera").innerHTML =
    `Lista de espera <span class="count">(${espera.length})</span>`;

  // Convocados: si todos ya pasaron a una alineación → mensaje de cierre.
  // La lista de espera se muestra igual (aún entran si alguien se baja).
  if (!convocados.length && yaAsignados.length) {
    document.getElementById("label-convocados").textContent = "Convocatoria cerrada";
    document.getElementById("lista-convocados").innerHTML = `
      <div class="conv-cerrada">
        <p>Los ${yaAsignados.length} convocados ya fueron asignados a su equipo y alineación.</p>
        <button class="btn-ir-alineacion" onclick="irAVista('alineacion')">
          Ver la alineación →
        </button>
      </div>`;
  } else {
    document.getElementById("label-convocados").innerHTML =
      `Convocados <span class="count">(${convocados.length})</span>`;
    // Cuadrícula compacta (2 col en celular) para evitar scroll largo.
    // Nombre y avatar desde la fila de Finanzas; el perfil se enlaza por
    // nombre (si existe en Jugadores de Estadísticas).
    document.getElementById("lista-convocados").innerHTML =
      convocados.length
        ? `<div class="roster-grid">` + convocados.map(p => {
            const idEst = idPorNombre(p.Nombre_Jugador);
            return `
            <div class="roster-cell" data-nombre="${p.Nombre_Jugador}"
                 ${idEst ? `onclick="abrirPerfil('${idEst}')"` : ""}>
              <div class="avatar">${iniciales(p.Nombre_Jugador)}</div>
              <div class="rc-info">
                <div class="rc-name">${p.Nombre_Jugador}</div>
                <div class="rc-pos">${idEst ? posicion(idEst) : ""}</div>
              </div>
            </div>`;
          }).join("") + `</div>`
        : `<p class="empty-msg">Sin convocados aún.</p>`;
  }

  // Lista de espera: en orden de turno, con estilo de reserva
  document.getElementById("lista-espera").innerHTML =
    espera.length
      ? espera.map((p, i) => {
          const idEst = idPorNombre(p.Nombre_Jugador);
          return `
          <div class="espera-row" data-nombre="${p.Nombre_Jugador}"
               ${idEst ? `onclick="abrirPerfil('${idEst}')"` : ""}>
            <div class="espera-num">${i + 1}</div>
            <div class="avatar">${iniciales(p.Nombre_Jugador)}</div>
            <div class="rc-info">
              <div class="rc-name">${p.Nombre_Jugador}</div>
            </div>
          </div>`;
        }).join("")
      : `<p class="empty-msg">Nadie en lista de espera.</p>`;

  aplicarBusquedaConvocatoria();
}

// Resalta en la convocatoria a quien coincida con lo digitado
function aplicarBusquedaConvocatoria() {
  resaltarPorNombre(
    document.getElementById("conv-player").value,
    document.querySelectorAll("#lista-convocados .roster-cell, #lista-espera .espera-row")
  );
}

// ---- Vista 2: Alineación (cancha) ----
// Formación 1-4-4-3 (12 jugadores por equipo). Si las posiciones reales
// no alcanzan, se rellena de abajo hacia arriba: arquero, defensa,
// mediocampista, delantero, con lo que haya disponible.
const FORMACION = [
  { pos: "Arquero",       cupo: 1 },
  { pos: "Defensa",       cupo: 4 },
  { pos: "Mediocampista", cupo: 4 },
  { pos: "Delantero",     cupo: 3 }
];

// Orden dentro de cada línea (izquierda → derecha). Menor número = más a la izquierda.
const POS_ORDER = {
  "Portero": 2, "Arquero": 2,
  "Lateral Izquierdo": 0, "Central": 2, "Defensa": 2, "Lateral Derecho": 4,
  "Mediocampista Izquierdo": 0, "Mediocampista": 2, "Mediocampista Derecho": 4,
  "Extremo Izquierdo": 0, "Delantero": 2, "Extremo Derecho": 4
};

function lineasEquipo(ids, posiciones = {}) {
  const lineas = { Arquero: [], Defensa: [], Mediocampista: [], Delantero: [] };
  const sobrantes = [];
  ids.forEach(id => {
    const posId = posiciones[id]?.linea || posiciones[id] || posicion(id);
    const f = FORMACION.find(f => f.pos === posId);
    if (f && lineas[f.pos].length < f.cupo) lineas[f.pos].push(id);
    else sobrantes.push(id);
  });
  FORMACION.forEach(f => {
    while (lineas[f.pos].length < f.cupo && sobrantes.length) lineas[f.pos].push(sobrantes.shift());
  });
  // Más de 12: las líneas se amplían de abajo hacia arriba (desde defensa)
  let i = 1;
  while (sobrantes.length) { lineas[FORMACION[Math.min(i, 3)].pos].push(sobrantes.shift()); i++; }
  // Ordenar cada línea por posición específica (izquierda → derecha)
  Object.keys(lineas).forEach(linea => {
    lineas[linea].sort((a, b) => {
      const pA = POS_ORDER[posiciones[a]?.especifica] ?? POS_ORDER[posicion(a)] ?? 2;
      const pB = POS_ORDER[posiciones[b]?.especifica] ?? POS_ORDER[posicion(b)] ?? 2;
      return pA - pB;
    });
  });
  return lineas;
}

function nombreCorto(id) {
  const partes = nombre(id).split(" ");
  return partes.length > 1 ? `${partes[0]} ${partes[partes.length - 1]}` : partes[0];
}
function nombreDosLineas(id) {
  const partes = nombre(id).split(" ");
  if (partes.length < 2) return `<span class="n-nombre">${partes[0]}</span>`;
  return `<span class="n-nombre">${partes[0]}</span><span class="n-ape">${partes[partes.length - 1]}</span>`;
}


function pitchHTML(ids, team, partido, posiciones = {}, capitanes = {}, ausentes = new Set()) {
  const l = lineasEquipo(ids, posiciones);
  const chip = id => {
    const posEsp = posiciones[id]?.especifica || posicion(id);
    const esCap = !!capitanes[id];
    const esPortero = (posiciones[id]?.linea || posicion(id)) === "Arquero";
    const esAusente = ausentes.has(id);
    return `
    <div class="pitch-player ${esCap ? "is-capitan" : ""} ${esAusente ? "ausente" : ""}" data-id="${id}" onclick="abrirPerfil('${id}')">
      ${esCap ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="cap-corona-svg" aria-hidden="true"><path fill="#C9A84C" d="M384,167L256,51.1L128,167L0,98.6v274.5h512V98.6L384,167z"/><rect fill="#C9A84C" y="411.8" width="512" height="49.1"/></svg>` : ""}
      <div class="avatar ${esPortero ? "portero" : team}">${iniciales(nombre(id))}</div>
      <div class="pp-name">${nombreDosLineas(id)}</div>
      <div class="pp-pos-badge">${posEsp}</div>
    </div>`;
  };
  const fila = arr => `<div class="p-line">${arr.map(chip).join("")}</div>`;
  return `
    <div class="pitch ${team}">
      <div class="pl-outer"></div><div class="pl-circle"></div>
      <div class="pl-box"></div><div class="pl-box-in"></div>
      <div class="pitch-rows">
        ${fila(l.Delantero)}
        ${fila(l.Mediocampista)}
        ${fila(l.Defensa)}
        ${fila(l.Arquero)}
      </div>
    </div>`;
}

function datosCategoria(key) {
  const c = CATEGORIAS[key];
  if (!c || !c.calc) return [];
  return MOCK_DATA.jugadores
    .map(j => ({ id: j.ID_Jugador, valor: c.calc(j.ID_Jugador) }))
    .filter(d => d.valor != null && d.valor > 0)
    .sort((a, b) => b.valor - a.valor)
    .slice(0, 10)
    .map(d => ({ id: d.id, valor: d.valor, texto: c.fmt ? c.fmt(d.valor) : String(d.valor) }));
}

// Largo de barra proporcional al desempeño (en inverso, el mejor llena más)
function barraPct(valor, datos, inverso) {
  if (inverso) {
    const min = Math.min(...datos.map(d => d.valor));
    return valor > 0 ? Math.max(8, Math.round((min / valor) * 100)) : 100;
  }
  const max = Math.max(...datos.map(d => d.valor));
  return max > 0 ? Math.max(8, Math.round((valor / max) * 100)) : 0;
}

// Bloque de goles + MVP reutilizable en Alineación y Partidos
function golesPartidoHTML(p) {
  const resultado = p.Goles_Rojo === p.Goles_Azul ? "Empate"
    : (p.Goles_Rojo > p.Goles_Azul ? "Victoria Roja" : "Victoria Azul");
  const evs = MOCK_DATA.eventos
    .filter(e => e.ID_Partido === p.ID_Partido)
    .sort((a, b) => (a.Minuto || 0) - (b.Minuto || 0));
  const golesDe = equipo => {
    const esRojo = equipo === "Rojo";
    const goles = evs.filter(e => e.Equipo === equipo);
    return goles.length
      ? goles.map(e => {
          const nm = `<span class="gl-name">${nombreCorto(e.Goleador)}${esAutogol(e) ? " (AG)" : ""}</span>`;
          const min = `<span class="min">${e.Minuto != null ? e.Minuto + "'" : ""}</span>`;
          const scorer = esRojo ? nm + min : min + nm;
          const assist = e.Asistente
            ? `<div class="gl-assist" onclick="abrirPerfil('${e.Asistente}');event.stopPropagation()">${esRojo ? nombreCorto(e.Asistente) + " ↲" : "↳ " + nombreCorto(e.Asistente)}</div>`
            : "";
          return `<div class="goal-line"><div class="gl-scorer" onclick="abrirPerfil('${e.Goleador}')">${scorer}</div>${assist}</div>`;
        }).join("")
      : `<div class="goal-line vacio">—</div>`;
  };
  const mvps = mvpsDe(p);
  return `
    <div class="mc-result">${resultado}</div>
    <div class="mc-goals">
      <div class="gcol rojo">${golesDe("Rojo")}</div>
      <div class="gcol azul">${golesDe("Azul")}</div>
    </div>
    ${mvps.length ? `<div class="mc-mvp">
      <span class="badge mvp">MVP</span>
      ${mvps.map(id => `<span class="mvp-name" onclick="abrirPerfil('${id}')">${nombre(id)}</span>`).join(" · ")}
    </div>` : ""}`;
}

  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t === btn));
  document.querySelectorAll(".view").forEach(v =>
    v.classList.toggle("active", v.id === "view-" + btn.dataset.view));
  // Centrar el tab activo en el nav
  const destino = btn.offsetLeft - navEl.clientWidth / 2 + btn.offsetWidth / 2;
  navEl.scrollTo({ left: destino, behavior: "smooth" });
  window.scrollTo({ top: 0 });
});

// Swipe horizontal en el contenido para cambiar de pestaña
(function() {
  let x0 = 0, y0 = 0, activo = false;
  const main = document.querySelector('main');
  main.addEventListener('touchstart', e => {
    if (navEl.contains(e.target)) { activo = false; return; }
    x0 = e.touches[0].clientX;
    y0 = e.touches[0].clientY;
    activo = true;
  }, { passive: true });
  main.addEventListener('touchend', e => {
    if (!activo) return;
    activo = false;
    const dx = e.changedTouches[0].clientX - x0;
    const dy = e.changedTouches[0].clientY - y0;
    if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
    const tabs = [...document.querySelectorAll('.tab')];
    const idx = tabs.findIndex(t => t.classList.contains('active'));
    const sig = dx < 0 ? idx + 1 : idx - 1;
    if (sig >= 0 && sig < tabs.length) tabs[sig].click();
  }, { passive: true });
})();

/* ============================================================
   FASE 2 — DATOS REALES (solo lectura, fetch GET)
   Pegar aquí la URL del Apps Script publicado como Web App.
   Si la URL está vacía o el fetch falla, se usan los datos
   mock / los últimos datos cargados.
   ============================================================ */
// MODO DE DATOS (decisión final): archivo manual `datos.xlsx` en la
// carpeta de la app. Los originales son .xlsx conectados a AppSheet y
// Apps Script no puede leerlos, así que el camino automático no existe.
// Flujo de Giovanni: copia de Estadísticas + pestaña con las 4 columnas
// públicas de Asignacion_Pagos → guardar como datos.xlsx aquí → subir.
// ⚠ A esta carpeta JAMÁS entran los archivos reales: todo se publica.
// Las URLs quedan por si algún día se migra a Sheets nativas (en vivo).
const FUENTES = {
  estadisticas: "",
  finanzas: ""
};

// Convierte cualquier representación de fecha del xlsx a "yyyy-MM-dd":
// objeto Date, serial de Excel (p.ej. 46040) o texto.
function aFechaISO(v) {
  if (v instanceof Date) return fechaISO(v);
  if (typeof v === "number" && v > 20000) {
    const d = new Date(Date.UTC(1899, 11, 30) + Math.round(v) * 86400000);
    const mm = String(d.getUTCMonth() + 1).padStart(2, "0");
    const dd = String(d.getUTCDate()).padStart(2, "0");
    return `${d.getUTCFullYear()}-${mm}-${dd}`;
  }
  const s = String(v || "").trim();
  // Texto "M/D/YYYY" (algunas celdas guardan la fecha como texto)
  const us = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (us) return `${us[3]}-${us[1].padStart(2, "0")}-${us[2].padStart(2, "0")}`;
  return s.slice(0, 10);
}

// Lee un campo tolerando tildes y mayúsculas en la cabecera
// ("Posición_Jugador", "ID_Alineación", "Asignacion" vs "Asignación")
function campo(obj, nombreNorm) {
  for (const k in obj) { if (normalizar(k) === nombreNorm) return obj[k]; }
  return "";
}

// Sanea cada fila a los 4 campos públicos. Monto, Estado y Perdonado
// NUNCA se almacenan aunque el archivo los trajera por error.
function sanearAsignaciones(filas) {
  return filas
    .filter(f => f && campo(f, "id_jugador") !== "")
    .map(f => ({
      ID_Jugador: String(campo(f, "id_jugador")),
      Nombre_Jugador: String(campo(f, "nombre_jugador")),
      Fecha_Asignacion: aFechaISO(campo(f, "fecha_asignacion")),
      Tipo_Asignacion: String(campo(f, "tipo_asignacion"))
    }));
}

async function fetchJson(url) {
  const resp = await fetch(url);
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  return resp.json();
}

// Datos crudos de Estadísticas (hojas reales); se mapearán a las
// tablas internas en el siguiente paso de la Fase 2.
let DATOS_ESTADISTICAS = null;

function fechaISO(d) {
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${d.getFullYear()}-${mm}-${dd}`;
}
function tiempoHHMM(d) {
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function categorizarLlegada(asistencia, horaLlegada) {
  const asNorm = normalizar(String(asistencia || ""));
  if (asNorm.includes("no asisti")) return "No";
  if (asNorm === "pendiente" || asNorm === "") return null;
  const m = String(horaLlegada || "").match(/^(\d{1,2}):(\d{2})/);
  if (!m) return "Tiempo";
  const min = parseInt(m[1]) * 60 + parseInt(m[2]);
  if (min <= 370) return "Temprano"; // ≤ 6:10
  if (min <= 380) return "Tiempo";   // 6:11–6:20
  return "Tarde";
}

// Lee datos.xlsx de la carpeta de la app y lo convierte al mismo
// formato JSON que entregaría un Apps Script: {NombreHoja: [filas]}
async function leerDatosXlsx() {
  if (typeof XLSX === "undefined") return null; // CDN no disponible
  let resp = null;
  for (const nombre of ["LBFC 2026.xlsx", "datos.xlsx"]) {
    resp = await fetch(encodeURI(nombre) + "?v=" + Date.now()).catch(() => null);
    if (resp && resp.ok) break;
  }
  if (!resp || !resp.ok) return null; // sin archivo → mock
  const buffer = await resp.arrayBuffer();
  const libro = XLSX.read(buffer, { cellDates: true });
  const json = {};
  libro.SheetNames.forEach(nombre => {
    json[nombre] = XLSX.utils.sheet_to_json(libro.Sheets[nombre], { defval: "" })
      .map(fila => {
        const obj = {};
        for (const k in fila) {
          obj[k] = fila[k] instanceof Date
          ? (fila[k].getFullYear() <= 1900 ? tiempoHHMM(fila[k]) : fechaISO(fila[k]))
          : fila[k];
        }
        return obj;
      });
  });
  return json;
}

/* ── Mapeo de las hojas reales a las tablas internas ──
   Estructura real (LBFC 2026.xlsx):
   - Jugadores: ID_Jugador ("J01"), Nombre_Jugador, Posición_Jugador
     (Portero/Defensa/Mediocampista/Delantero), Estado, Fotos.
   - Partidos: solo la lista de fechas → el marcador se DERIVA de Evento.
   - Alineaciones (fila-jugador): Fecha_Partido, ID_Jugador, Equipo,
     Asistencia (Asistió/No asistió/Pendiente), Hora_Llegada,
     Tiempo_Cancha, MVP (SI/NO), Diferenciador.
   - Evento: Fecha_Partido, Gol_Equipo, ID_Goleador, Tipo_Gol,
     ID_Asistidor, Tipo_Asistencia, Minuto.                          */

const POS_CANON = {
  "portero": "Arquero", "arquero": "Arquero",
  "defensa": "Defensa", "central": "Defensa",
  "lateral derecho": "Defensa", "lateral izquierdo": "Defensa",
  "mediocampista": "Mediocampista",
  "mediocampista derecho": "Mediocampista", "mediocampista izquierdo": "Mediocampista",
  "delantero": "Delantero",
  "extremo derecho": "Delantero", "extremo izquierdo": "Delantero"
};

function esFormatoReal(json) {
  return Array.isArray(json.Alineaciones) && json.Alineaciones.length > 0
    && campo(json.Alineaciones[0], "fecha_partido") !== "";
}

function transformarDatosReales(json) {
  // Jugadores
  MOCK_DATA.jugadores = (json.Jugadores || [])
    .filter(j => campo(j, "id_jugador") !== "")
    .map(j => ({
      ID_Jugador: String(campo(j, "id_jugador")),
      Nombre: String(campo(j, "nombre_jugador")),
      Posicion: POS_CANON[normalizar(String(campo(j, "posicion_jugador")))] || "",
      Estado: String(campo(j, "estado"))
    }));

  // Eventos (goles): conserva Tipo_Asistencia para el pilar VJ
  MOCK_DATA.eventos = (json.Evento || [])
    .filter(e => campo(e, "id_goleador") !== "")
    .map(e => ({
      ID_Partido: aFechaISO(campo(e, "fecha_partido")),
      Goleador: String(campo(e, "id_goleador")),
      Asistente: campo(e, "id_asistidor") !== "" ? String(campo(e, "id_asistidor")) : null,
      Equipo: String(campo(e, "gol_equipo")),
      Tipo_Gol: String(campo(e, "tipo_gol")),
      Tipo_Asistencia: String(campo(e, "tipo_asistencia")),
      Minuto: Number(campo(e, "minuto")) || null
    }));

  // Alineaciones agrupadas por fecha; MVP/Diferenciador salen de aquí.
  // Solo se aceptan IDs que existan en Jugadores (filtra filas corruptas).
  const idsValidos = new Set(MOCK_DATA.jugadores.map(j => j.ID_Jugador));
  const porFecha = {};
  const asistenciaArr = [];
  (json.Alineaciones || []).forEach(a => {
    const f = aFechaISO(campo(a, "fecha_partido"));
    const id = String(campo(a, "id_jugador"));
    if (!f || !id || !idsValidos.has(id)) return;
    if (!porFecha[f]) porFecha[f] = { Rojo: [], Azul: [], MVP: [], Dif: [], Posiciones: {}, Capitanes: {}, Ausentes: [] };
    const equipo = String(campo(a, "equipo"));
    const noAsistio = normalizar(String(campo(a, "asistencia"))) === "no asistio";
    if (equipo === "Rojo" || equipo === "Azul") {
      porFecha[f][equipo].push(id);
      if (noAsistio) porFecha[f].Ausentes.push(id);
    }
    if (String(campo(a, "mvp")).toUpperCase() === "SI") porFecha[f].MVP.push(id);
    if (String(campo(a, "diferenciador")).trim() !== "") porFecha[f].Dif.push(id);
    const posJRaw = String(campo(a, "posicion_jugador")).trim();
    const posJ = normalizar(posJRaw);
    if (posJ && POS_CANON[posJ]) porFecha[f].Posiciones[id] = { linea: POS_CANON[posJ], especifica: posJRaw };
    const capRaw = campo(a, "capitan");
    const esCapitan = capRaw === true || ["true", "verdadero"].includes(normalizar(String(capRaw)));
    if (esCapitan && (equipo === "Rojo" || equipo === "Azul")) porFecha[f].Capitanes[id] = true;
    const ll = categorizarLlegada(campo(a, "asistencia"), campo(a, "hora_llegada"));
    if (ll !== null) asistenciaArr.push({ ID_Jugador: id, ID_Partido: f, Llegada: ll });
  });
  MOCK_DATA.alineaciones = Object.entries(porFecha)
    .map(([f, d]) => ({ ID_Partido: f, Rojo: d.Rojo, Azul: d.Azul, Posiciones: d.Posiciones, Capitanes: d.Capitanes || {}, Ausentes: d.Ausentes || [] }));
  MOCK_DATA.asistencia = asistenciaArr;

  // Partidos: fechas de la hoja Partidos + las vistas en Alineaciones.
  // Marcador derivado de Evento; sin resultado si la fecha es futura.
  const fechas = new Set(
    (json.Partidos || []).map(p => aFechaISO(campo(p, "fecha_partido"))).filter(Boolean)
  );
  Object.keys(porFecha).forEach(f => fechas.add(f));
  const hoy = fechaISO(new Date());
  MOCK_DATA.partidos = [...fechas].sort().map(f => {
    const jugado = f <= hoy;
    const d = porFecha[f] || { MVP: [], Dif: [] };
    return {
      ID_Partido: f,
      Fecha: f,
      Goles_Rojo: jugado ? MOCK_DATA.eventos.filter(e => e.ID_Partido === f && e.Equipo === "Rojo").length : null,
      Goles_Azul: jugado ? MOCK_DATA.eventos.filter(e => e.ID_Partido === f && e.Equipo === "Azul").length : null,
      MVP: d.MVP,
      Diferenciador: d.Dif.length ? d.Dif[0] : null
    };
  });
}

// Vuelca el JSON {Hoja: [filas]} sobre los datos activos
function aplicarDatos(json) {
  // Asignacion_Pagos (tolerante a tildes en el nombre de la pestaña)
  const claveAsig = Object.keys(json).find(k => normalizar(k).startsWith("asignacion_pagos"));
  if (claveAsig && Array.isArray(json[claveAsig])) {
    MOCK_DATA.asignacionPagos = sanearAsignaciones(json[claveAsig]);
  }
  if (esFormatoReal(json)) transformarDatosReales(json);
  DATOS_ESTADISTICAS = json;
  indexarJugadores();
}

async function cargarDatos() {
  let aviso = null;
  try {
    if (FUENTES.finanzas || FUENTES.estadisticas) {
      // Modo en vivo (solo si algún día se migra a Sheets nativas)
      const tareas = [];
      if (FUENTES.finanzas) {
        tareas.push(fetchJson(FUENTES.finanzas).then(json => {
          const filas = Array.isArray(json) ? json : json.Asignacion_Pagos;
          if (Array.isArray(filas)) MOCK_DATA.asignacionPagos = sanearAsignaciones(filas);
        }));
      }
      if (FUENTES.estadisticas) {
        tareas.push(fetchJson(FUENTES.estadisticas).then(json => { DATOS_ESTADISTICAS = json; }));
      }
      const resultados = await Promise.allSettled(tareas);
      if (resultados.some(r => r.status === "rejected")) {
        aviso = "Sin conexión con la Sheet — mostrando últimos datos";
      }
    } else {
      // Modo archivo (el elegido): datos.xlsx junto al index
      const json = await leerDatosXlsx();
      if (json) aplicarDatos(json);
      // Sin datos.xlsx → mock, sin avisos (desarrollo)
    }
  } catch (err) {
    aviso = "No se pudo leer datos.xlsx — mostrando últimos datos";
  }
  renderTodo();
  return aviso;
}


// Carga automática al abrir
normalizarIdsMock();
indexarJugadores();
cargarDatos();
</script>
