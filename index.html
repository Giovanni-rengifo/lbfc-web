<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Bigotes F.C. — Dashboard Deportivo</title>
<meta name="description" content="Dashboard deportivo de Los Bigotes F.C. — Convocatorias, alineaciones, goleadores y estadísticas del club.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E222E">
<link rel="icon" type="image/png" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LOS BIGOTES F.C. — Identidad visual
   Superficie dominante: azul petróleo (color de club).
   Dorado solo como acento heráldico: nombre del club, pestaña
   activa, MVP, primer puesto. Sin glows, sin neón.
   ============================================================ */
:root {
  --color-primary:    #1B3A4B;  /* Azul petróleo */
  --color-secondary:  #8B1A1A;  /* Rojo vino */
  --color-gold:       #C9A84C;  /* Dorado */
  --color-black:      #0A0A0A;
  --color-parchment:  #E8D5A3;  /* Pergamino */
  --color-text-light: #F0E6CC;  /* Texto sobre oscuro */

  /* Derivados de superficie (todos tintados al azul petróleo) */
  --bg:        #0E222E;
  --surface:   #16303F;
  --surface-2: #1C3A4B;
  --azul-team: #24506A;  /* bloque del Equipo Azul, distinguible del fondo */
  --azul-chip: #4E8CAC;  /* texto/markers del Azul sobre oscuro */
  --rojo-chip: #C45050;  /* texto/markers del Rojo sobre oscuro */
  --line:      rgba(232, 213, 163, .14);
  --text-dim:  rgba(240, 230, 204, .62);

  --font-title: 'Cinzel', serif;
  --font-body:  'Lora', serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--color-text-light);
  font-family: var(--font-body);
  min-height: 100vh;
  line-height: 1.55;
  overscroll-behavior-x: none;
}

/* ---------- Header: franja de club ---------- */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .9rem;
  padding: 1.1rem 1rem 1rem;
  border-bottom: 2px solid var(--color-gold);
  background: var(--color-primary);
}
.crest { width: 64px; height: 64px; flex: 0 0 64px; display: block; object-fit: contain; }
.club-id { text-align: left; }
h1 {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: clamp(1.15rem, 4.5vw, 1.7rem);
  letter-spacing: .1em;
  color: var(--color-gold);
  text-transform: uppercase;
  line-height: 1.15;
}
.club-sub {
  font-size: .8rem;
  color: var(--text-dim);
  margin-top: .1rem;
}


/* ---------- Navegación: pestañas con subrayado ---------- */
.nav-outer {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--color-primary);
  border-bottom: 1px solid var(--line);
}
.nav-outer::before, .nav-outer::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 3rem;
  pointer-events: none;
  transition: opacity .25s;
  z-index: 1;
}
.nav-outer::before {
  left: 0;
  background: linear-gradient(270deg, transparent, var(--color-primary) 85%);
  opacity: 0;
}
.nav-outer::after {
  right: 0;
  background: linear-gradient(90deg, transparent, var(--color-primary) 85%);
}
.nav-outer.nav-al-inicio::before { opacity: 0; }
.nav-outer:not(.nav-al-inicio)::before { opacity: 1; }
.nav-outer.nav-al-final::after { opacity: 0; }
nav {
  display: flex;
  overflow-x: auto;
  padding: 0 3rem 0 .5rem;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
.tab {
  flex: 0 0 auto;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-dim);
  font-family: var(--font-title);
  font-size: .74rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  padding: .85rem .8rem .7rem;
  cursor: pointer;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
}
.tab:hover { color: var(--color-text-light); }
.tab.active { color: var(--color-gold); border-bottom-color: var(--color-gold); }

/* ---------- Layout ---------- */
main { max-width: 1100px; margin: 0 auto; padding: 1.4rem .9rem 3rem; min-height: 80vh; touch-action: pan-y; }
.view { display: none; animation: fadeIn .25s ease-out; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.view-title {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--color-text-light);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.view-sub {
  font-style: italic;
  color: var(--text-dim);
  font-size: .9rem;
  margin: .15rem 0 1.2rem;
}

/* ---------- Secciones y listas ---------- */
.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 6px;
}
.section-label {
  font-family: var(--font-title);
  font-size: .78rem;
  font-weight: 600;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--color-parchment);
  margin: 1.5rem 0 .6rem;
}
.section-label .count {
  color: var(--text-dim);
  font-family: var(--font-body);
  letter-spacing: 0;
  margin-left: .3rem;
}

/* ---------- Convocatoria: cuadrícula compacta ---------- */
.roster-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
}
.roster-cell {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .5rem .6rem;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .15s;
  min-width: 0;
}
.roster-cell:nth-child(odd) { border-right: 1px solid var(--line); }
.roster-cell:hover { background: var(--surface-2); }
.roster-cell:nth-last-child(1), .roster-cell:nth-last-child(2):nth-child(odd) { border-bottom: none; }
.roster-cell .avatar { width: 30px; height: 30px; flex: 0 0 30px; font-size: .6rem; }
.rc-info { min-width: 0; }
.rc-name {
  font-weight: 600;
  font-size: .84rem;
  color: var(--color-text-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rc-pos { font-size: .68rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Lista de espera: claramente "en reserva" */
.espera-card {
  background: transparent;
  border: 1px dashed rgba(232, 213, 163, .4);
}
.espera-row {
  display: flex;
  align-items: center;
  gap: .6rem;
  padding: .45rem .7rem;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .15s;
}
.espera-row:last-child { border-bottom: none; }
.espera-row:hover { background: var(--surface-2); }
.espera-num {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .85rem;
  color: var(--text-dim);
  min-width: 1.4rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.espera-row .avatar {
  width: 30px; height: 30px; flex: 0 0 30px;
  font-size: .6rem;
  background: transparent;
  border: 1px solid var(--line);
  color: var(--text-dim);
}
.espera-row .rc-name { color: var(--color-parchment); font-weight: 500; }

/* Resaltado del buscador en convocatoria */
.roster-cell.dimmed, .espera-row.dimmed { opacity: .3; }
.roster-cell.hit, .espera-row.hit { background: rgba(201, 168, 76, .15); }
.roster-cell.hit .avatar, .espera-row.hit .avatar {
  border: 1.5px solid var(--color-gold);
  box-shadow: 0 0 0 1.5px var(--color-gold);
  color: var(--color-text-light);
}
.roster-cell.hit .rc-name, .espera-row.hit .rc-name { color: var(--color-gold); font-weight: 700; }

/* ---------- Fila de jugador ---------- */
.player-row {
  display: flex; align-items: center; gap: .8rem;
  padding: .6rem .8rem;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .15s;
}
.player-row:last-child { border-bottom: none; }
.player-row:hover { background: var(--surface-2); }
.avatar {
  width: 40px; height: 40px;
  flex: 0 0 40px;
  border-radius: 50%;
  background: var(--azul-team);
  color: var(--color-text-light);
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .8rem;
  display: flex; align-items: center; justify-content: center;
}
.avatar.rojo { background: var(--color-secondary); }
.avatar.azul { background: var(--azul-team); }
.p-name { font-weight: 600; font-size: .96rem; color: var(--color-text-light); }
.p-pos  { font-size: .78rem; color: var(--text-dim); }
.p-info { flex: 1; min-width: 0; }
.p-stat {
  font-weight: 700;
  color: var(--color-text-light);
  font-size: 1.1rem;
  text-align: right;
  min-width: 2.6rem;
  font-variant-numeric: tabular-nums;
}
.p-stat small {
  display: block;
  font-weight: 400;
  font-size: .6rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: .08em;
}

.badge {
  display: inline-block;
  font-family: var(--font-body);
  font-size: .64rem;
  font-weight: 700;
  letter-spacing: .06em;
  padding: .1rem .42rem;
  border-radius: 3px;
  background: rgba(232,213,163,.12);
  color: var(--color-parchment);
  margin-left: .4rem;
  vertical-align: middle;
  text-transform: uppercase;
}
.badge.mvp { background: var(--color-gold); color: var(--color-primary); }
.mc-difs { display:flex; flex-wrap:wrap; gap:.3rem; justify-content:center; padding:.5rem .5rem .15rem; margin-top:.6rem; border-top:1px solid var(--line); }
.dif-chip { display:inline-flex; align-items:center; gap:.25rem; background:rgba(44,196,180,.1); border:1px solid rgba(44,196,180,.3); color:#2cc4b4; padding:2px 8px 2px 6px; border-radius:10px; font-size:.68rem; cursor:pointer; font-family:var(--font-title); letter-spacing:.02em; }
.dif-chip:hover { background:rgba(44,196,180,.2); }

.rank-num {
  font-weight: 700;
  font-size: .92rem;
  color: var(--text-dim);
  min-width: 1.7rem;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.rank-num.first { color: var(--color-gold); font-size: 1.05rem; }

/* ---------- Marcador (banner del último partido) ---------- */
.score-banner {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 1rem;
  text-align: center;
  margin-bottom: 1rem;
}
.score-banner .fecha { font-size: .82rem; color: var(--text-dim); margin-bottom: .5rem; }
.score-line {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: .9rem;
}
.score-team {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .95rem;
  letter-spacing: .12em;
  text-transform: uppercase;
}
.score-team.rojo { color: var(--rojo-chip); }
.score-team.azul { color: var(--azul-chip); }
.score-nums {
  font-family: var(--font-title);
  font-weight: 900;
  font-size: 2.1rem;
  color: var(--color-text-light);
  font-variant-numeric: tabular-nums;
}

/* ---------- Alineación: cabecera de fecha y controles ---------- */
.ali-header { text-align: center; margin: .5rem 0 1rem; }
.ali-status {
  display: inline-block;
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .68rem;
  letter-spacing: .16em;
  text-transform: uppercase;
  padding: .22rem .65rem;
  border-radius: 3px;
}
.ali-status.proximo { background: var(--color-gold); color: var(--color-primary); }
.ali-status.pasado { background: rgba(232,213,163,.16); color: var(--color-parchment); }
.ali-status.conv { background: transparent; color: var(--color-gold); border: 1.5px solid var(--color-gold); }
#conv-fecha { font-size: clamp(.85rem, 3vw, 1rem); color: var(--text-dim); margin-top: .2rem; }
.conv-desc { font-size: clamp(1rem, 4vw, 1.35rem); color: var(--color-text-light); font-family: var(--font-title); font-weight: 700; margin-top: .3rem; }
.ali-fecha {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: clamp(1.25rem, 5.5vw, 1.8rem);
  color: var(--color-text-light);
  letter-spacing: .04em;
  margin-top: .35rem;
  line-height: 1.2;
}
.ali-note { font-size: .84rem; font-style: italic; color: var(--text-dim); margin-top: .35rem; }
.ali-controls { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: .8rem; }
.ali-controls input {
  flex: 1 1 12rem;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--color-text-light);
  font-family: var(--font-body);
  font-size: .9rem;
  padding: .55rem .7rem;
  border-radius: 5px;
}
.ali-controls input:focus {
  outline: none;
  border-color: var(--color-gold);
}
.ali-controls input::placeholder { color: var(--text-dim); }

/* Selector de fechas custom (reemplaza el <select> nativo) */
.cs-wrap { position: relative; flex: 1 1 12rem; }
.cs-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .4rem;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--color-text-light);
  font-family: var(--font-body);
  font-size: .9rem;
  padding: .55rem .7rem;
  border-radius: 5px;
  cursor: pointer;
  text-align: left;
  transition: border-color .15s;
}
.cs-btn:focus, .cs-btn.open { outline: none; border-color: var(--color-gold); }
.cs-arrow { font-size: 1rem; line-height: 1; color: var(--text-dim); flex-shrink: 0; transition: transform .2s, color .15s; }
.cs-btn.open .cs-arrow { transform: rotate(180deg); color: var(--color-gold); }
.cs-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cs-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  z-index: 60;
  background: var(--surface-2);
  border: 1px solid var(--color-gold);
  border-radius: 6px;
  max-height: 240px;
  overflow-y: auto;
  box-shadow: 0 10px 24px rgba(0,0,0,.55);
  display: none;
}
.cs-list.open { display: block; }
.cs-item {
  padding: .5rem .8rem;
  font-size: .9rem;
  color: var(--color-text-light);
  cursor: pointer;
  border-bottom: 1px solid var(--line);
}
.cs-item:last-child { border-bottom: none; }
.cs-item:hover { background: rgba(201,168,76,.15); color: var(--color-gold); }
.cs-item.selected { color: var(--color-gold); font-weight: 600; }

/* Autocompletado propio: la lista vive dentro de la página, con el estilo del sitio */
.autocomplete { position: relative; flex: 1 1 12rem; display: flex; }
.autocomplete input { width: 100%; padding-right: 2.2rem; }
.ac-toggle {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 2.2rem;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color .15s, transform .2s;
}
.ac-toggle:hover { color: var(--color-gold); }
.ac-toggle.open { transform: rotate(180deg); color: var(--color-gold); }
.ac-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  z-index: 60;
  background: var(--surface-2);
  border: 1px solid var(--color-gold);
  border-radius: 6px;
  max-height: 240px;
  overflow-y: auto;
  box-shadow: 0 10px 24px rgba(0, 0, 0, .55);
  display: none;
}
.ac-list.open { display: block; }
.ac-item {
  padding: .5rem .8rem;
  font-size: .9rem;
  color: var(--color-text-light);
  cursor: pointer;
  border-bottom: 1px solid var(--line);
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.active { background: rgba(201, 168, 76, .15); color: var(--color-gold); }
.pitch-player.dimmed { opacity: .3; }
.pitch-player.ausente { opacity: .65; filter: grayscale(.9); }
.pitch-player.ausente .avatar { border-style: dashed; border-color: rgba(240,230,204,.5); background: rgba(20,40,55,.7) !important; }
.pitch-player.ausente .pp-name { color: var(--text-dim); }
.pitch-player.hit .avatar {
  border-color: var(--color-gold);
  box-shadow: 0 0 0 2px var(--color-gold);
}
.pitch-player.hit .pp-name { background: var(--color-gold); color: var(--color-primary); font-weight: 700; }

/* ---------- Alineación: cancha de fútbol ---------- */
.versus-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
.team-card { overflow: hidden; }
.team-head {
  font-family: var(--font-title);
  font-weight: 700;
  text-align: center;
  letter-spacing: .18em;
  text-transform: uppercase;
  font-size: .88rem;
  padding: .6rem;
  color: var(--color-text-light);
}
.team-head.rojo { background: var(--color-secondary); }
.team-head.azul { background: var(--azul-team); }

/* Media cancha vertical: ataque hacia arriba, arquero abajo.
   Franjas de césped en el color del equipo. */
.pitch { position: relative; padding: 1rem .35rem .8rem; }
.pitch.rojo { background: repeating-linear-gradient(180deg, #5C1414 0 54px, #521111 54px 108px); }
.pitch.azul { background: repeating-linear-gradient(180deg, #1E4459 0 54px, #1A3C50 54px 108px); }
.pl-outer, .pl-circle, .pl-box, .pl-box-in {
  position: absolute;
  border: 1.5px solid rgba(240, 230, 204, .28);
  pointer-events: none;
}
.pl-outer { inset: 7px; }
.pl-circle {
  top: 7px; left: 50%;
  transform: translateX(-50%);
  width: 96px; height: 48px;
  border-top: none;
  border-radius: 0 0 96px 96px;
}
.pl-box {
  bottom: 7px; left: 50%;
  transform: translateX(-50%);
  width: 60%; height: 62px;
  border-bottom: none;
}
.pl-box-in {
  bottom: 7px; left: 50%;
  transform: translateX(-50%);
  width: 30%; height: 26px;
  border-bottom: none;
}
.pitch-rows {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: .7rem;
  min-height: 420px;
}
.p-line { display: flex; justify-content: space-evenly; align-items: flex-start; }
.pitch-player {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .18rem;
  cursor: pointer;
  width: 25%;
  max-width: 80px;
  position: relative;
}
.pitch-player .avatar {
  width: 38px; height: 38px;
  flex: 0 0 auto;
  border: 1.5px solid rgba(232, 213, 163, .55);
  font-size: .72rem;
}
.pitch-player.is-mvp .avatar {
  border-color: var(--color-gold);
  box-shadow: 0 0 0 1.5px var(--color-gold);
}
.dif-bolt { color:var(--color-gold); font-size:.75em; vertical-align:middle; margin-left:2px; }
.pp-name {
  font-size: .62rem;
  color: var(--color-text-light);
  background: rgba(8, 18, 26, .5);
  padding: .1rem .32rem;
  border-radius: 3px;
  max-width: 100%;
  text-align: center;
  line-height: 1.25;
}
.pp-name .n-nombre, .pod-name .n-nombre { display: block; white-space: nowrap; }
.pp-name .n-ape, .pod-name .n-ape { display: block; white-space: nowrap; }
.pp-pos-badge {
  font-size: .5rem;
  color: var(--text-dim);
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  margin-top: .1rem;
}
.cap-corona-svg {
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 20px;
  pointer-events: none;
}
.dif-rayo-svg {
  position: absolute;
  top: -13px;
  left: 50%;
  transform: translateX(-50%);
  width: 13px; height: 13px;
  pointer-events: none;
  opacity: .75;
}
.pitch-player.is-capitan .dif-rayo-svg {
  left: calc(50% + 11px);
  transform: none;
}
.pitch-player.is-dif .avatar {
  border-color: #2cc4b4;
  box-shadow: 0 0 0 1px #2cc4b4;
}
.pitch-player.is-capitan .avatar {
  border: 2.5px solid var(--color-gold);
  box-shadow: 0 0 0 1px var(--color-gold);
}
.avatar.portero { background: #1e5228; }

/* ---------- Estadísticas: Distinciones (medallas) ---------- */
.distinciones-label, .categorias-label {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--color-parchment);
  margin: 1.3rem 0 .7rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.distinciones-label::after, .categorias-label::after {
  content: ""; flex: 1; height: 1px; background: var(--line);
}
.med-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
.med-card {
  background: rgba(201,168,76,.07);
  border: 1px solid rgba(201,168,76,.34);
  border-radius: 8px;
  padding: .8rem .6rem;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .15s;
}
.med-card:hover { border-color: var(--color-gold); background: rgba(201,168,76,.13); }
.med-ico { width: 34px; height: 34px; margin: 0 auto .4rem; color: var(--color-gold); }
.med-ico svg { width: 100%; height: 100%; }
.glifo-ext { display:block; width:100%; height:100%; background-color:currentColor; mask-size:contain; mask-repeat:no-repeat; mask-position:center; }
.med-title { font-family: var(--font-title); font-weight: 700; font-size: .76rem; color: var(--color-parchment); letter-spacing: .02em; }
.med-desc { font-size: .61rem; color: var(--text-dim); margin-top: .12rem; line-height: 1.35; }
.med-holder { font-size: .82rem; color: var(--color-text-light); font-weight: 600; margin-top: .3rem; }
.med-meta { font-size: .65rem; color: var(--text-dim); margin-top: .1rem; }
.emblema-card { background: rgba(159,188,212,.07); border-color: rgba(159,188,212,.28); cursor: default; }
.emblema-card:hover { border-color: rgba(159,188,212,.6); background: rgba(159,188,212,.12); }
.emblema-card .med-ico { color: #9fbcd4; }
.emblema-card .med-title { color: #b8cfdf; }
.anti-card { background: rgba(160,40,40,.07); border-color: rgba(160,40,40,.3); cursor: default; }
.anti-card:hover { border-color: rgba(200,60,60,.6); background: rgba(160,40,40,.13); }
.anti-card .med-ico { color: #c84040; }
.anti-card .med-title { color: #d46060; }
.dist-chip.anti-chip { color: #c84040; background: rgba(160,40,40,.1); border-color: rgba(160,40,40,.4); }
.buscar-toggle {
  display: flex; align-items: center; gap: .45rem;
  font-family: var(--font-title); font-size: .7rem; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--color-parchment);
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: 6px; padding: .55rem .9rem;
  cursor: pointer; margin-bottom: .4rem; user-select: none;
  transition: border-color .2s;
}
.buscar-toggle::after { content: "▾"; margin-left: auto; transition: transform .2s; }
.buscar-toggle:hover, .buscar-toggle.activo { border-color: rgba(201,168,76,.45); }
.buscar-toggle.activo::after { transform: rotate(180deg); }
.buscar-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--color-gold); color: #1a1209;
  border-radius: 999px; font-size: .58rem; min-width: 1.15rem; height: 1.15rem;
  padding: 0 .25rem; font-weight: 700;
}
.buscar-panel {
  background: var(--surface-2); border: 1px solid rgba(201,168,76,.2);
  border-radius: 6px; padding: .75rem; margin-bottom: .8rem;
  display: flex; flex-direction: column; gap: .45rem;
}
.jugador-buscar {
  width: 100%; box-sizing: border-box;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 6px; color: var(--color-text-light);
  font-family: var(--font-body); font-size: .88rem;
  padding: .45rem .7rem; outline: none;
}
.jugador-buscar:focus { border-color: rgba(201,168,76,.5); }
.jugador-buscar::placeholder { color: var(--text-dim); }
.buscar-grupo-label {
  font-family: var(--font-title); font-size: .6rem; font-weight: 700;
  letter-spacing: .09em; text-transform: uppercase; color: var(--text-dim);
  margin-top: .2rem;
}
.buscar-chips-row { display: flex; flex-wrap: wrap; gap: .3rem; }
.buscar-chip {
  font-family: var(--font-title); font-size: .65rem; font-weight: 700;
  letter-spacing: .02em; color: var(--text-dim);
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 999px; padding: .22rem .55rem;
  cursor: pointer; user-select: none;
  transition: color .15s, border-color .15s, background .15s;
}
/* Colores por categoría — inactivo */
.buscar-chip[data-tipo="dist"]               { color: rgba(201,168,76,.75); border-color: rgba(201,168,76,.3); }
.buscar-chip[data-tipo="embl"]:not([data-anti]) { color: rgba(159,188,212,.7); border-color: rgba(159,188,212,.25); }
.buscar-chip[data-anti]                      { color: #c84040; border-color: rgba(160,40,40,.4); }
/* Hover */
.buscar-chip[data-tipo="dist"]:hover               { color: var(--color-gold); border-color: rgba(201,168,76,.6); background: rgba(201,168,76,.06); }
.buscar-chip[data-tipo="embl"]:not([data-anti]):hover { color: #9fbcd4; border-color: rgba(159,188,212,.5); background: rgba(159,188,212,.06); }
.buscar-chip[data-anti]:hover                      { color: #d46060; border-color: rgba(160,40,40,.6); background: rgba(160,40,40,.06); }
/* Activo */
.buscar-chip.activo                { color: var(--color-gold); background: rgba(201,168,76,.12); border-color: rgba(201,168,76,.6); }
.buscar-chip[data-tipo="embl"].activo:not([data-anti]) { color: #9fbcd4; background: rgba(159,188,212,.12); border-color: rgba(159,188,212,.6); }
.buscar-chip[data-anti].activo     { color: #c84040; background: rgba(160,40,40,.12); border-color: rgba(160,40,40,.6); }
.buscar-limpiar {
  background: none; border: 1px solid var(--line); border-radius: 6px;
  color: var(--text-dim); font-family: var(--font-title); font-size: .66rem;
  letter-spacing: .05em; font-weight: 700; padding: .35rem .75rem;
  cursor: pointer; align-self: flex-start; transition: color .2s, border-color .2s;
}
.buscar-limpiar:hover { color: var(--color-parchment); border-color: rgba(201,168,76,.4); }
@media (min-width: 900px) {
  .med-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ---------- Estadísticas: hub de categorías ---------- */
.stats-hub { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: .85rem .8rem;
  cursor: pointer;
  transition: border-color .2s, background .15s;
}
.stat-card:hover { border-color: var(--acc, var(--color-gold)); background: var(--surface-2); }
.sc-title {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .7rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--color-parchment);
}
.sc-value {
  font-family: var(--font-title);
  font-weight: 900;
  font-size: 1.8rem;
  color: var(--acc, var(--color-gold));
  margin-top: .35rem;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.sc-value small {
  display: block;
  font-family: var(--font-body);
  font-weight: 400;
  font-size: .62rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-top: .2rem;
}
.sc-leader { display: flex; align-items: center; gap: .45rem; margin-top: .6rem; }
.sc-leader .avatar { width: 28px; height: 28px; flex: 0 0 28px; font-size: .56rem; }
.sc-leader-name {
  font-size: .76rem;
  color: var(--color-text-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sc-cta { font-size: .66rem; color: var(--text-dim); margin-top: .55rem; }

/* ---------- Estadísticas: detalle de categoría ---------- */
.stat-back {
  display: inline-flex;
  align-items: center;
  gap: .45rem;
  background: none;
  border: none;
  color: var(--color-parchment);
  font-family: var(--font-title);
  font-weight: 600;
  font-size: .76rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  cursor: pointer;
  padding: .35rem .2rem;
  margin: .2rem 0 .4rem;
}
.stat-back:hover { color: var(--color-gold); }
/* Podio con medallas: oro / plata / bronce, alturas bien contrastadas */
.podium {
  --oro: #C9A84C;
  --plata: #AEB6BD;
  --bronce: #A8703D;
  display: flex; align-items: flex-end; justify-content: center; gap: .55rem; margin: 1.1rem 0 1.3rem;
}
.pod { text-align: center; flex: 1; max-width: 110px; cursor: pointer; }
.pod .avatar { margin: 0 auto .3rem; width: 40px; height: 40px; flex-basis: auto; font-size: .72rem; }
.pod-1 .avatar { width: 60px; height: 60px; font-size: 1rem; border: 2.5px solid var(--oro); }
.pod-2 .avatar { border: 2px solid var(--plata); }
.pod-3 .avatar { border: 2px solid var(--bronce); }
.pod-medal {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .64rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: .25rem;
}
.pod-1 .pod-medal { color: var(--oro); }
.pod-2 .pod-medal { color: var(--plata); }
.pod-3 .pod-medal { color: var(--bronce); }
.pod-name { font-size: .72rem; color: var(--color-text-light); line-height: 1.25; }
.pod-1 .pod-name { font-size: .8rem; font-weight: 600; }
.pod-val { font-weight: 700; font-size: .86rem; color: var(--color-parchment); font-variant-numeric: tabular-nums; }
.pod-1 .pod-val { color: var(--oro); font-size: 1.15rem; }
.pod-base {
  margin-top: .4rem;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-bottom: none;
  border-radius: 4px 4px 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-title);
  font-weight: 900;
  font-size: 1.05rem;
}
.pod-1 .pod-base {
  height: 76px;
  border-top: 3px solid var(--oro);
  color: var(--oro);
  background: linear-gradient(180deg, rgba(201,168,76,.16), var(--surface-2));
  font-size: 1.4rem;
}
.pod-2 .pod-base { height: 40px; border-top: 3px solid var(--plata); color: var(--plata); }
.pod-3 .pod-base { height: 22px; border-top: 3px solid var(--bronce); color: var(--bronce); }
.stat-rows { border-top: 1px solid var(--line); }
.stat-row {
  display: flex;
  align-items: center;
  gap: .65rem;
  padding: .55rem .75rem;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background .15s;
}
.stat-row:hover { background: var(--surface-2); }
.stat-row .rank-num { min-width: 1.4rem; }
.sr-mid { flex: 1; min-width: 0; }
.sr-name { font-size: .84rem; color: var(--color-text-light); margin-bottom: .25rem; }
.sr-bar { height: 7px; background: rgba(232,213,163,.1); border-radius: 3px; overflow: hidden; }
.sr-fill { height: 100%; border-radius: 3px; background: var(--acc, var(--color-parchment)); opacity: .85; }
.sr-val { font-weight: 700; font-size: .92rem; font-variant-numeric: tabular-nums; min-width: 2.4rem; text-align: right; }

@media (min-width: 900px) {
  .stats-hub { grid-template-columns: repeat(4, 1fr); }
}

/* ---------- Historial: tarjetas de partido (estilo Premier League) ---------- */
.match-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: .9rem .8rem 1rem;
  margin-bottom: .8rem;
  text-align: center;
}
.mc-date {
  font-family: var(--font-title);
  font-weight: 600;
  font-size: .7rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.mc-score {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: .9rem;
  margin-top: .45rem;
}
.mc-score .score-nums { font-size: 1.7rem; }
.mc-result {
  font-size: .76rem;
  font-style: italic;
  color: var(--text-dim);
  margin: .1rem 0 .7rem;
}
.mc-goals {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--line);
  padding-top: .65rem;
}
.gcol { padding: 0 .7rem; }
.gcol.rojo { text-align: right; border-right: 1px solid var(--line); }
.gcol.azul { text-align: left; }
.goal-line {
  font-size: .8rem;
  color: var(--color-parchment);
  margin-bottom: .3rem;
}
.goal-line.vacio { color: var(--text-dim); line-height: 1.9; }
.gl-scorer {
  display: block;
  cursor: pointer;
  line-height: 1.7;
}
.gl-scorer:hover { color: var(--color-text-light); }
.goal-line .min {
  display: inline-block;
  color: var(--text-dim);
  font-size: .7rem;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  padding: 0 .2rem;
}
.gl-assist {
  font-size: .72rem;
  color: var(--text-dim);
  line-height: 1.5;
  cursor: pointer;
}
.gcol.rojo .gl-assist { text-align: right; padding-right: .9rem; }
.gcol.azul .gl-assist { text-align: left; padding-left: .9rem; }
.gl-assist:hover { color: var(--color-gold); }
.mc-mvp {
  margin-top: .75rem;
  padding-top: .65rem;
  border-top: 1px solid var(--line);
  font-size: .82rem;
  color: var(--color-text-light);
}
.mc-mvp .badge { margin: 0 .35rem 0 0; }
.mvp-name { cursor: pointer; }
.mvp-name:hover { color: var(--color-gold); }

/* ---------- Modal perfil ---------- */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10, 22, 30, .8);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--line);
  border-top: 3px solid var(--color-gold);
  border-radius: 12px 12px 0 0;
  width: 100%;
  max-width: 520px;
  max-height: 88vh;
  overflow-y: auto;
  padding: 1.3rem 1.2rem 1.8rem;
  animation: slideUp .25s ease-out;
}
@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-close {
  float: right;
  background: none; border: none;
  color: var(--text-dim);
  font-size: 1.4rem;
  cursor: pointer;
  line-height: 1;
}
.modal-close:hover { color: var(--color-text-light); }
.profile-head { text-align: center; margin-bottom: 1rem; }
.profile-head .avatar { width: 68px; height: 68px; flex-basis: 68px; font-size: 1.25rem; margin: 0 auto .5rem; }
.profile-name {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--color-text-light);
  letter-spacing: .06em;
}
.profile-pos { font-size: .86rem; color: var(--text-dim); }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: .55rem;
  margin-top: .9rem;
}
.stat-box { grid-column: span 2; }
.stat-grid .stat-box:nth-child(4),
.stat-grid .stat-box:nth-child(5) { grid-column: span 3; }
.perfil-nivel {
  background: rgba(201,168,76,.07);
  border: 1px solid rgba(201,168,76,.3);
  border-radius: 10px;
  padding: .9rem 1rem;
  margin-top: .8rem;
}
.perfil-nivel-top { display: flex; justify-content: space-between; align-items: baseline; }
.perfil-nivel-num { font-family: var(--font-title); font-weight: 700; font-size: 1.5rem; color: var(--color-gold); line-height: 1; }
.perfil-nivel-xp { font-size: .82rem; color: var(--text-dim); }
.nivel-track { height: 7px; background: rgba(232,213,163,.12); border-radius: 4px; overflow: hidden; margin: .55rem 0 .3rem; }
.nivel-fill { height: 100%; background: linear-gradient(90deg, var(--color-gold), #e0b84a); border-radius: 4px; }
.nivel-next { font-size: .64rem; color: var(--text-dim); }

/* ---------- Pestaña Jugadores ---------- */
.jugadores-grid { display: grid; grid-template-columns: 1fr; gap: .6rem; padding: .6rem 0; }
@media (min-width: 600px) { .jugadores-grid { grid-template-columns: 1fr 1fr; } }
.jugador-card {
  display: flex; align-items: flex-start; gap: .8rem;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: .75rem .8rem;
  cursor: pointer; transition: border-color .15s, background .15s;
}
.jugador-card:hover { border-color: rgba(201,168,76,.4); background: var(--surface-2); }
.jugador-card-av {
  width: 42px; height: 42px; flex: 0 0 42px;
  background: var(--color-primary); border: 1px solid rgba(201,168,76,.3);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-title); font-weight: 700; font-size: .78rem; color: var(--color-gold);
}
.jugador-card-body { flex: 1; min-width: 0; }
.jugador-card-nombre { font-family: var(--font-title); font-weight: 700; font-size: .88rem; color: var(--color-parchment); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.jugador-card-pos { font-size: .7rem; color: var(--text-dim); }
.jugador-card-nivel { font-size: .76rem; color: var(--color-gold); font-family: var(--font-title); font-weight: 600; margin-top: .15rem; }
.jugador-card-dist { display: flex; flex-wrap: wrap; gap: .2rem; margin-top: .35rem; }

/* ---------- Distancias al líder (perfil) ---------- */
.distancias-section { margin-top: 1rem; }
.dist-row { display: flex; gap: .5rem; padding: .3rem 0; border-bottom: 1px solid var(--line); align-items: baseline; flex-wrap: wrap; }
.dist-row:last-child { border-bottom: none; }
.dist-row-titulo { flex: 0 0 8rem; font-size: .76rem; font-family: var(--font-title); color: var(--color-parchment); font-weight: 600; }
.dist-lider-yo { font-size: .76rem; color: var(--color-gold); font-weight: 700; }
.dist-lider-val { font-size: .74rem; color: var(--text-dim); line-height: 1.4; }
.dist-lider-val strong { color: var(--color-parchment); font-weight: 600; }
.stat-box {
  text-align: center;
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: .65rem .3rem;
  background: var(--surface-2);
}
.stat-box .num {
  font-weight: 700;
  font-size: 1.4rem;
  color: var(--color-text-light);
  font-variant-numeric: tabular-nums;
}
.stat-box .lbl { font-size: .62rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); margin-top: .1rem; }

/* Card de Partidos con barras de progreso */
.partidos-card {
  margin-top: .55rem;
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: .6rem .8rem;
  background: var(--surface-2);
}
.partidos-card-title {
  font-size: .62rem;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: .55rem;
}
.pb-row { display: flex; align-items: center; gap: .5rem; }
.pb-row + .pb-row { margin-top: .38rem; }
.pb-lbl { font-size: .65rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); min-width: 4.4rem; }
.pb-track { flex: 1; height: 8px; background: rgba(232,213,163,.1); border-radius: 3px; overflow: hidden; }
.pb-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.pb-fill.pb-total { background: var(--color-parchment); opacity: .65; }
.pb-fill.pb-win   { background: var(--color-gold); }
.pb-fill.pb-loss  { background: var(--color-secondary); opacity: .9; }
.pb-val { font-size: .84rem; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 1.6rem; text-align: right; color: var(--color-text-light); }
/* Gestos Técnicos — perfil y top 10 */
.perfil-gestos { margin-top: 1rem; }
.gesto-grupo { display: flex; flex-wrap: wrap; align-items: center; gap: .35rem; margin-top: .45rem; }
.gesto-tipo-lbl { font-size: .72rem; font-weight: 700; color: var(--color-text-light); font-family: var(--font-title); min-width: 4.5rem; text-transform: uppercase; letter-spacing: .03em; }
.gesto-tag { font-size: .74rem; background: rgba(180,140,60,.12); border: 1px solid rgba(180,140,60,.28); border-radius: 999px; padding: .13rem .52rem; color: var(--color-parchment); font-family: var(--font-body); }
.pod-sub  { font-size: .68rem; color: var(--text-dim); font-style: italic; margin-top: .15rem; text-align: center; line-height: 1.3; }
.sr-sub   { font-size: .7rem;  color: var(--text-dim); font-style: italic; margin-top: .05rem; line-height: 1.3; }

/* Pilares del jugador (perfil) */
.pilares { margin-top: 1.1rem; }
.pilares-title {
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .72rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--color-gold);
  text-align: center;
  margin-bottom: .65rem;
}
.pilar-row { display: flex; align-items: center; gap: .6rem; padding: .3rem 0; }
.pilar-nombre { flex: 0 0 8.2rem; font-size: .8rem; color: var(--color-text-light); }
.pilar-bar { flex: 1; height: 9px; background: rgba(232,213,163,.1); border-radius: 4px; overflow: hidden; }
.pilar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, #8a7233, var(--color-gold));
}
.pilares-note {
  margin-top: .6rem;
  text-align: center;
  font-size: .7rem;
  font-style: italic;
  color: var(--text-dim);
}
.perfil-distinciones { display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; margin-top: .8rem; }
.dist-chip {
  font-family: var(--font-title);
  font-size: .68rem;
  font-weight: 700;
  letter-spacing: .02em;
  color: var(--color-gold);
  background: rgba(201,168,76,.1);
  border: 1px solid rgba(201,168,76,.4);
  border-radius: 999px;
  padding: .2rem .6rem;
}
.emblema-chip {
  color: #9fbcd4;
  background: rgba(159,188,212,.08);
  border-color: rgba(159,188,212,.35);
}
.pilar-val {
  flex: 0 0 2.9rem;
  text-align: right;
  font-weight: 700;
  font-size: .88rem;
  color: var(--color-gold);
  font-variant-numeric: tabular-nums;
}
.pilar-row.pendiente .pilar-nombre { color: var(--text-dim); }
.pilar-row.pendiente .pilar-val { color: var(--text-dim); font-weight: 400; font-size: .68rem; font-style: italic; }

/* ---------- Footer ---------- */
footer {
  text-align: center;
  padding: 1.4rem 1rem 2rem;
  border-top: 1px solid var(--line);
  font-size: .78rem;
  color: var(--text-dim);
  font-style: italic;
}

.empty-msg { text-align: center; font-style: italic; color: var(--text-dim); padding: 1.5rem; }

/* Convocatoria cerrada: los convocados ya tienen equipo y alineación */
.conv-cerrada { text-align: center; padding: 1.6rem 1.2rem; }
.conv-cerrada p { font-size: .95rem; color: var(--color-parchment); margin-bottom: 1rem; }
.btn-ir-alineacion {
  background: transparent;
  border: 1px solid var(--color-gold);
  color: var(--color-gold);
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .76rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: .6rem 1.1rem;
  border-radius: 5px;
  cursor: pointer;
  transition: background .2s, color .2s;
}
.btn-ir-alineacion:hover { background: var(--color-gold); color: var(--color-primary); }

/* ---------- Vista: Información ---------- */
.info-guia-titulo {
  font-family: var(--font-title);
  font-size: 1.35rem;
  font-weight: 700;
  letter-spacing: .06em;
  color: var(--color-parchment);
  margin: .3rem 0 1.4rem;
}
.info-bloque {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  margin-bottom: .75rem;
  overflow: hidden;
}
.info-titulo {
  font-family: var(--font-title);
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--color-gold);
  margin: 0;
  padding: .9rem 1rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  list-style: none;
  user-select: none;
}
.info-titulo::-webkit-details-marker { display: none; }
.info-titulo::after {
  content: '▾';
  font-size: 1rem;
  transition: transform .3s ease;
  flex-shrink: 0;
}
details[open] > .info-titulo::after { transform: rotate(-180deg); }
.info-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows .3s ease;
}
details[open] > .info-body { grid-template-rows: 1fr; }
.info-body > div {
  overflow: hidden;
  padding: 0 1rem;
}
details[open] > .info-body > div { padding-bottom: .5rem; }
.info-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: .65rem 0;
  border-bottom: 1px solid var(--line);
}
.info-item:last-child { border-bottom: none; padding-bottom: 0; }
.info-item:first-child { padding-top: 0; }
.info-demo {
  flex: 0 0 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .25rem;
}
.info-texto > strong {
  display: block;
  font-family: var(--font-title);
  font-size: .76rem;
  color: var(--color-parchment);
  letter-spacing: .04em;
  margin-bottom: .25rem;
}
.info-texto p { font-size: .84rem; color: var(--text-dim); line-height: 1.55; margin: 0; }
.info-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-title);
  font-weight: 700;
  font-size: .68rem;
  color: var(--color-text-light);
  position: relative;
  flex-shrink: 0;
}
.info-avatar.rojo  { background: var(--color-secondary); }
.info-avatar.azul  { background: var(--azul-team); }
.info-avatar.gk    { background: #1e5228; }
.info-avatar.cap   { border: 2px solid var(--color-gold); box-shadow: 0 0 0 1px var(--color-gold); }
.info-avatar.ghost { opacity: .5; filter: grayscale(.9); }
.info-crown-mini {
  position: absolute;
  top: -12px; left: 50%;
  transform: translateX(-50%);
  width: 15px; height: 15px;
  pointer-events: none;
}

/* ---------- Tablet / Desktop ---------- */
@media (min-width: 600px) {
  .versus-grid { grid-template-columns: 1fr 1fr; }
  .roster-grid { grid-template-columns: repeat(3, 1fr); }
  .roster-cell { border-right: 1px solid var(--line); }
  .roster-cell:nth-child(3n) { border-right: none; }
  nav { justify-content: center; }
  .modal-overlay { align-items: center; padding: 1rem; }
  .modal { border-radius: 12px; }
  .match-card { grid-template-columns: 6.5rem 1fr 14rem; }
}
/* ── Splash de carga ── */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1.2rem;
  transition: opacity .5s ease;
}
#splash.splash-out { opacity: 0; pointer-events: none; }
#splash img { width: 92px; height: 92px; animation: spl-pulse 1.8s ease-in-out infinite; }
#splash p { font-family: var(--font-title); color: var(--color-gold); letter-spacing: .15em; font-size: .78rem; opacity: .75; }
@keyframes spl-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.9);opacity:.45} }

/* ============================================================
   CAPA DE DATOS — derivaciones desde las tablas crudas
   ============================================================ */
// Índice de jugadores; se reconstruye cuando llegan datos reales.
// Todos los IDs internos son STRINGS (los reales son tipo "J01").
let byId = {};
function indexarJugadores() {
  byId = Object.fromEntries(MOCK_DATA.jugadores.map(j => [j.ID_Jugador, j]));
}

// Los IDs del mock son numéricos: se convierten a string una sola vez
// para que todo el código compare siempre string === string.
function normalizarIdsMock() {
  MOCK_DATA.jugadores.forEach(j => { j.ID_Jugador = String(j.ID_Jugador); });
  MOCK_DATA.partidos.forEach(p => {
    p.ID_Partido = String(p.ID_Partido);
    if (p.MVP != null) p.MVP = (Array.isArray(p.MVP) ? p.MVP : [p.MVP]).map(String);
    if (p.Diferenciador != null) p.Diferenciador = String(p.Diferenciador);
  });
  MOCK_DATA.alineaciones.forEach(a => {
    a.ID_Partido = String(a.ID_Partido);
    a.Rojo = a.Rojo.map(String);
    a.Azul = a.Azul.map(String);
    a.Parciales = (a.Parciales || []).map(String);
  });
  MOCK_DATA.eventos.forEach(e => {
    e.ID_Partido = String(e.ID_Partido);
    e.Goleador = String(e.Goleador);
    if (e.Asistente != null) e.Asistente = String(e.Asistente);
  });
  MOCK_DATA.asignacionPagos.forEach(p => { p.ID_Jugador = String(p.ID_Jugador); });
  (MOCK_DATA.asistencia || []).forEach(a => {
    a.ID_Jugador = String(a.ID_Jugador);
    a.ID_Partido = String(a.ID_Partido);
  });
}

function nombre(id) { return byId[id] ? byId[id].Nombre : "—"; }

// Cruce por nombre: los IDs de Finanzas y Estadísticas son numeraciones
// INDEPENDIENTES (J15 es una persona distinta en cada archivo), así que
// la Convocatoria enlaza al perfil buscando el nombre en Jugadores.
function idPorNombre(nombreBuscado) {
  const q = normalizar(String(nombreBuscado));
  const j = MOCK_DATA.jugadores.find(j => normalizar(j.Nombre) === q);
  return j ? j.ID_Jugador : null;
}
function posicion(id) { return byId[id] ? byId[id].Posicion : ""; }
function iniciales(n) {
  return n.split(" ").map(p => p[0]).slice(0, 2).join("").toUpperCase();
}
function fmtFecha(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const dias = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const date = new Date(y, m - 1, d);
  return `${dias[date.getDay()]} ${d} de ${meses[m - 1]} de ${y}`;
}
function fmtFechaCorta(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${d} ${meses[m - 1]} ${y}`;
}

// Un partido está jugado cuando tiene resultado; el próximo aún no lo tiene
function esJugado(p) { return p.Goles_Rojo != null && p.Goles_Azul != null; }

// El MVP puede ser uno o varios: acepta número o lista en el campo MVP
function mvpsDe(p) {
  if (p.MVP == null) return [];
  return Array.isArray(p.MVP) ? p.MVP : [p.MVP];
}

// Autogol con tolerancia a mayúsculas/tildes
function esAutogol(e) { return normalizar(String(e.Tipo_Gol)) === "autogol"; }

// Comparación de nombres sin acentos ni mayúsculas
function normalizar(s) {
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

// Autocompletado propio (el datalist nativo no se puede estilizar).
// Cada input toma sus sugerencias de FUENTES_AC[id], que las vistas
// actualizan al renderizar. Soporta flechas, Enter, Escape y click.
const FUENTES_AC = {};

function initAutocomplete(id) {
  const input = document.getElementById(id);
  const lista = document.getElementById(id + "-ac");
  let activo = -1;

  // Botón toggle (flecha) inyectado dinámicamente
  const toggle = document.createElement("button");
  toggle.type = "button";
  toggle.className = "ac-toggle";
  toggle.setAttribute("aria-label", "Desplegar opciones");
  toggle.textContent = "▼";
  input.parentElement.insertBefore(toggle, lista);

  function abrir() {
    const q = normalizar(input.value.trim());
    const nombres = (FUENTES_AC[id] || []).filter(n => !q || normalizar(n).includes(q));
    if (!nombres.length) { cerrar(); return; }
    lista.innerHTML = nombres.map(n => `<div class="ac-item">${n}</div>`).join("");
    lista.classList.add("open");
    toggle.classList.add("open");
    activo = -1;
  }
  function cerrar() {
    lista.classList.remove("open");
    toggle.classList.remove("open");
    activo = -1;
  }
  let ignorarAbrir = false;

  function elegir(n) {
    input.value = n;
    ignorarAbrir = true;
    input.dispatchEvent(new Event("input")); // resalta sin reabrir dropdown
    cerrar();
    input.blur(); // cierra teclado en móvil
    setTimeout(() => {
      ignorarAbrir = false;
      // reposiciona al jugador tras cerrar el teclado
      const hit = document.querySelector(".pitch-player.hit, .roster-cell.hit, .espera-row.hit");
      if (hit) hit.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 350);
  }

  toggle.addEventListener("mousedown", e => {
    e.preventDefault();
    if (lista.classList.contains("open")) { cerrar(); }
    else { abrir(); input.focus(); }
  });

  input.addEventListener("focus", abrir);
  input.addEventListener("input", () => { if (!ignorarAbrir) abrir(); });
  input.addEventListener("blur", () => setTimeout(cerrar, 120));
  input.addEventListener("keydown", e => {
    // Sostener Backspace → borrar todo de una vez
    if (e.key === "Backspace" && e.repeat) {
      e.preventDefault();
      input.value = "";
      input.dispatchEvent(new Event("input"));
      return;
    }
    const items = [...lista.querySelectorAll(".ac-item")];
    if (e.key === "ArrowDown" || e.key === "ArrowUp") {
      if (!lista.classList.contains("open")) { abrir(); return; }
      activo = e.key === "ArrowDown"
        ? Math.min(activo + 1, items.length - 1)
        : Math.max(activo - 1, 0);
      items.forEach((el, i) => el.classList.toggle("active", i === activo));
      if (items[activo]) items[activo].scrollIntoView({ block: "nearest" });
      e.preventDefault();
    } else if (e.key === "Enter") {
      if (activo >= 0 && items[activo]) { elegir(items[activo].textContent); e.preventDefault(); }
      else cerrar();
    } else if (e.key === "Escape") {
      cerrar();
    }
  });
  lista.addEventListener("mousedown", e => {
    const item = e.target.closest(".ac-item");
    if (item) { e.preventDefault(); elegir(item.textContent); }
  });
}

// Resalta en las celdas dadas a los jugadores cuyo nombre coincide con lo
// escrito; atenúa el resto y hace scroll hasta el primero. Vacío = limpiar.
function resaltarPorNombre(texto, celdas) {
  const q = normalizar(texto.trim());
  celdas.forEach(c => c.classList.remove("hit", "dimmed"));
  if (!q) return;
  let primero = null;
  celdas.forEach(c => {
    const nombreCelda = c.dataset.nombre || nombre(c.dataset.id);
    const coincide = normalizar(nombreCelda).includes(q);
    c.classList.add(coincide ? "hit" : "dimmed");
    if (coincide && !primero) primero = c;
  });
  if (primero) primero.scrollIntoView({ behavior: "instant", block: "center" });
}

// "Rojo"|"Azul"|null. Devuelve null si el jugador no asistió — esos datos no cuentan.
function equipoDe(id, a) {
  if ((a.Ausentes || []).includes(id)) return null;
  return a.Rojo.includes(id) ? "Rojo" : a.Azul.includes(id) ? "Azul" : null;
}

// Estadísticas agregadas por jugador (derivadas, nunca hardcodeadas).
// Solo cuentan los partidos ya jugados — la alineación futura no suma.
function statsJugador(id) {
  const goles = MOCK_DATA.eventos.filter(e => e.Goleador === id && !esAutogol(e)).length;
  const asistencias = MOCK_DATA.eventos.filter(e => e.Asistente === id).length;
  const idsJugados = new Set(MOCK_DATA.partidos.filter(esJugado).map(p => p.ID_Partido));
  let jugados = 0, vecesRojo = 0, vecesAzul = 0;
  MOCK_DATA.alineaciones.forEach(a => {
    if (!idsJugados.has(a.ID_Partido)) return;
    const eq = equipoDe(id, a);
    if (eq === "Rojo") { jugados++; vecesRojo++; }
    else if (eq === "Azul") { jugados++; vecesAzul++; }
  });
  const mvps = MOCK_DATA.partidos.filter(p => mvpsDe(p).includes(id)).length;
  const difs = MOCK_DATA.alineaciones
    .filter(a => idsJugados.has(a.ID_Partido) && (a.Diferenciadores || []).includes(id))
    .length;
  const total = idsJugados.size;
  const pct = total > 0 ? Math.round((jugados / total) * 100) : 0;
  let ganados = 0, perdidos = 0;
  MOCK_DATA.alineaciones.forEach(a => {
    if (!idsJugados.has(a.ID_Partido)) return;
    const p = MOCK_DATA.partidos.find(p => p.ID_Partido === a.ID_Partido);
    if (!p || p.Goles_Rojo === p.Goles_Azul) return;
    const equipo = equipoDe(id, a);
    if (!equipo) return;
    const gana = p.Goles_Rojo > p.Goles_Azul ? "Rojo" : "Azul";
    if (equipo === gana) ganados++; else perdidos++;
  });
  // Tipo de gol más frecuente
  const tipos = {};
  MOCK_DATA.eventos.filter(e => e.Goleador === id && !esAutogol(e))
    .forEach(e => { tipos[e.Tipo_Gol] = (tipos[e.Tipo_Gol] || 0) + 1; });
  const tipoDestacado = Object.entries(tipos).sort((a, b) => b[1] - a[1])[0];
  const equipoFrecuente = vecesRojo === vecesAzul ? "Equilibrado" : (vecesRojo > vecesAzul ? "Rojo" : "Azul");
  return { goles, asistencias, jugados, ganados, perdidos, pct, mvps, difs,
           tipoDestacado: tipoDestacado ? tipoDestacado[0] : "—", equipoFrecuente };
}

/* ============================================================
   PILARES — Sistema de Nivel Base + Deltas (jun-2026)
   PO · VJ · PD: nivelBase (Excel) + Σ delta(resultado, margen, individual). Acotado [0,10].
   Fair Play: porcentaje por partido. Temporada = PROMEDIO.
   ============================================================ */

  "porteria": 3
};
const LABEL_GOL  = { "jugada":"Goles","gol":"Goles","penal":"Penal","cabeza":"Cabeza","tiro libre":"Tiro libre","fuera del area":"Fuera del área","olimpico":"Olímpico","chilena":"Chilena","autogol":"Autogol" };
const LABEL_PASE = { "normal":"Pases Gol","asistencia":"Pases Gol","tiro libre":"Tiro libre","esquina":"Esquina","tiro de esquina":"Tiro de esquina","porteria":"Portería" };
const FP_PESOS = { "Temprano": 100, "Tiempo": 85, "Tarde": 75, "No": 0, "Sancionado": 0 };

function eventosDelPartido(idPartido) {

/* ============================================================
   SALÓN DE LEYENDAS — Nivel de Leyenda (XP) + Distinciones
   Todo automático desde los datos. El Nivel solo sube.
   ============================================================ */

// Valores de XP por acción en cada partido jugado
const XP = {
  jugar: 10,          // por presentarse y jugar
  victoria: 5,        // si su equipo ganó
  gol: 8,             // por cada gol (no autogol)
  asistencia: 6,      // por cada pase gol
  valla: 4,           // valla invicta: su equipo no recibió goles
  mvp: 10,            // MVP del partido
  diferenciador: 6,   // mejor de su posición (Arq/Def, Med o Del) en el partido
  temprano: 3,        // llegó temprano
  tiempo: 2           // llegó a tiempo
};
const XP_POR_NIVEL = 20;

function llegadaDe(id, idPartido) {
  const reg = (MOCK_DATA.asistencia || []).find(a => a.ID_Jugador === id && a.ID_Partido === idPartido);
  return reg ? reg.Llegada : null;
}

// XP total de la temporada (suma de todos los partidos jugados)
function xpJugador(id) {
  const idsJugados = new Set(MOCK_DATA.partidos.filter(esJugado).map(p => p.ID_Partido));
  let xp = 0;
  MOCK_DATA.alineaciones.forEach(a => {
    if (!idsJugados.has(a.ID_Partido)) return;
    const equipo = equipoDe(id, a);
    if (!equipo) return;
    const p = MOCK_DATA.partidos.find(x => x.ID_Partido === a.ID_Partido);
    if (!p) return;
    xp += XP.jugar;
    const gA = equipo === "Rojo" ? p.Goles_Rojo : p.Goles_Azul;
    const gC = equipo === "Rojo" ? p.Goles_Azul : p.Goles_Rojo;
    if (gA > gC) xp += XP.victoria;
    if (gC === 0) xp += XP.valla;
    if (mvpsDe(p).includes(id)) xp += XP.mvp;
    if ((a.Diferenciadores || []).includes(id)) xp += gA < gC ? Math.round(XP.diferenciador / 2) : XP.diferenciador;
    const ll = llegadaDe(id, a.ID_Partido);
    if (ll === "Temprano") xp += XP.temprano;
    else if (ll === "Tiempo") xp += XP.tiempo;
  });
  MOCK_DATA.eventos.forEach(e => {
    if (!idsJugados.has(e.ID_Partido)) return;
    if (e.Goleador === id && !esAutogol(e)) xp += XP.gol;
    if (e.Asistente === id) xp += XP.asistencia;
  });
  return xp;
}

// Nivel y progreso dentro del nivel a partir del XP
function nivelDe(xp) {
  const nivel = Math.floor(xp / XP_POR_NIVEL) + 1;
  const pct = Math.round(((xp % XP_POR_NIVEL) / XP_POR_NIVEL) * 100);
  return { nivel, pct };
}


// Vallas invictas en las que participó el jugador (su equipo no recibió goles)
function vallasInvictas(id) {
  const idsJugados = new Set(MOCK_DATA.partidos.filter(esJugado).map(p => p.ID_Partido));
  let n = 0;
  MOCK_DATA.alineaciones.forEach(a => {
    if (!idsJugados.has(a.ID_Partido)) return;
    const equipo = equipoDe(id, a);
    if (!equipo) return;
    const p = MOCK_DATA.partidos.find(x => x.ID_Partido === a.ID_Partido);
    if (!p) return;
    const gC = equipo === "Rojo" ? p.Goles_Azul : p.Goles_Rojo;
    if (gC === 0) n++;
  });
  return n;
}

// Puntos de temporada: Victoria=3, Empate=1, Derrota=0
function puntosTemporada(id) {
  let pts = 0;
  MOCK_DATA.alineaciones.forEach(a => {
    const p = MOCK_DATA.partidos.find(x => x.ID_Partido === a.ID_Partido);
    if (!p || !esJugado(p)) return;
    const equipo = equipoDe(id, a);
    if (!equipo) return;
    const gA = equipo === "Rojo" ? p.Goles_Rojo : p.Goles_Azul;
    const gC = equipo === "Rojo" ? p.Goles_Azul : p.Goles_Rojo;
    if (gA > gC) pts += 3;
    else if (gA === gC) pts += 1;
  });
  return pts;
}


function pilFP(id, p, ali) {
  const equipo = equipoDe(id, ali);
  if (!equipo) return null;
  const reg = (MOCK_DATA.asistencia || []).find(a => a.ID_Jugador === id && a.ID_Partido === p.ID_Partido);
  return FP_PESOS[reg ? reg.Llegada : "Tiempo"] ?? 85;
}


function calcPromedio(fn) {
  return function(id) {
    let total = 0, count = 0;
    MOCK_DATA.alineaciones.forEach(a => {
      const p = MOCK_DATA.partidos.find(x => x.ID_Partido === a.ID_Partido);
      if (!p || !esJugado(p)) return;
      const v = fn(id, p, a);
      if (v !== null) { total += v; count++; }
    });
    return count > 0 ? Math.round(total / count) : 0;
  };
}

const fairPlay = calcPromedio(pilFP);

// Devuelve true si el evento e es el Gol Victoria del partido p.
// GV = gol nº (goles_perdedor_final + 1) del equipo ganador, ordenado por minuto.
function esGolVictoria(e, p) {
  if (!p || !esJugado(p)) return false;
  if (esAutogol(e)) return false;
  const ganador = p.Goles_Rojo > p.Goles_Azul ? "Rojo" : p.Goles_Azul > p.Goles_Rojo ? "Azul" : null;
  if (!ganador || e.Equipo !== ganador) return false;
  const golesPerdedor = ganador === "Rojo" ? p.Goles_Azul : p.Goles_Rojo;
  const golesGanador = MOCK_DATA.eventos
    .filter(ev => ev.ID_Partido === p.ID_Partido && ev.Equipo === ganador && !esAutogol(ev))
    .sort((a, b) => (a.Minuto || 0) - (b.Minuto || 0));
  return golesGanador[golesPerdedor] === e;
}

// Veces que el jugador anotó el Gol Victoria en la temporada
function golesVictoriaDe(id) {
  const idsJugados = new Set(MOCK_DATA.partidos.filter(esJugado).map(p => p.ID_Partido));
  return MOCK_DATA.eventos.filter(e => {
    if (e.Goleador !== id || esAutogol(e) || !idsJugados.has(e.ID_Partido)) return false;
    const p = MOCK_DATA.partidos.find(x => x.ID_Partido === e.ID_Partido);
    return esGolVictoria(e, p);
  }).length;
}

// Partidos en los que el jugador anotó un gol Y dio una asistencia en el mismo partido
function partidosCompletos(id) {
  const idsJugados = new Set(MOCK_DATA.partidos.filter(esJugado).map(p => p.ID_Partido));
  return [...idsJugados].filter(idP => {
    const evs = MOCK_DATA.eventos.filter(e => e.ID_Partido === idP);
    return evs.some(e => e.Goleador === id && !esAutogol(e)) && evs.some(e => e.Asistente === id);
  }).length;
}

// Veces que el jugador fue capitán en un partido jugado
function vecesCpitan(id) {
  const idsJugados = new Set(MOCK_DATA.partidos.filter(esJugado).map(p => p.ID_Partido));
  return MOCK_DATA.alineaciones
    .filter(a => idsJugados.has(a.ID_Partido) && (a.Capitanes || {})[id])
    .length;
}

// Racha más larga de partidos consecutivos sin faltar
function rachaConsecutiva(id) {
  const jugados = MOCK_DATA.partidos.filter(esJugado)
    .sort((a, b) => String(a.ID_Partido).localeCompare(String(b.ID_Partido)));
  let max = 0, racha = 0;
  jugados.forEach(p => {
    const a = MOCK_DATA.alineaciones.find(x => x.ID_Partido === p.ID_Partido);
    if (a && equipoDe(id, a) !== null) {
      if (++racha > max) max = racha;
    } else { racha = 0; }
  });
  return max;
}

// Para la distinción El Puntual: requiere haber jugado al menos el 40% de los partidos
// de la temporada (mínimo 3). Evita que jugadores con pocas apariciones dominen el ranking.
function fairPlayClasif(id) {
  const total = MOCK_DATA.partidos.filter(esJugado).length;
  const min = Math.max(3, Math.round(total * 0.4));
  if (statsJugador(id).jugados < min) return 0;
  return fairPlay(id);
}

// Devuelve el jugador líder de una distinción (o null si nadie tiene > 0).
// Cuando la distinción tiene `display`, ese valor se usa para mostrar; el
// ranking sigue usando `metrica`.
function liderDistincion(d) {
  let best = null, bestV = 0;
  MOCK_DATA.jugadores.forEach(j => {
    if (d.filtro && !d.filtro(j.ID_Jugador)) return;
    const v = d.metrica(j.ID_Jugador);
    if (v > bestV) { bestV = v; best = j.ID_Jugador; }
  });
  if (!best) return null;
  const display = d.display ? d.display(best) : bestV;
  return { id: best, valor: bestV, display };
}

// Distinciones que ostenta un jugador (para mostrar en su perfil)
function distincionesDe(id) {
  return DISTINCIONES.filter(d => {
    const l = liderDistincion(d);
    return l && l.id === id;
  }).map(d => d.titulo);
}

// ---- Maldiciones (anti-emblemas permanentes, rojo oscuro) ----
let _antiCache = null;
function _antiPrecompute() {
  if (_antiCache) return _antiCache;
  const aus = {}, tard = {}, perd = {}, jug = {};
  MOCK_DATA.jugadores.forEach(j => {
    const id = j.ID_Jugador;
    aus[id]  = (MOCK_DATA.asistencia || []).filter(a => a.ID_Jugador === id && a.Llegada === "No").length;
    tard[id] = (MOCK_DATA.asistencia || []).filter(a => a.ID_Jugador === id && a.Llegada === "Tarde").length;
    const s  = statsJugador(id);
    jug[id]  = s.jugados;
    perd[id] = s.perdidos;
  });
  const maxAus  = Math.max(0, ...Object.values(aus));
  const maxTard = Math.max(0, ...Object.values(tard));
  const maxPerd = Math.max(0, ...MOCK_DATA.jugadores
    .filter(j => jug[j.ID_Jugador] >= 3).map(j => perd[j.ID_Jugador]));
  _antiCache = { aus, tard, perd, jug, maxAus, maxTard, maxPerd };
  return _antiCache;
}

const ANTI_EMBLEMAS = [
  {
    titulo: "El Generoso",
    glifo:  "regalo",
    desc:   "Anotó al menos 1 autogol en la temporada",

      const ids = new Set(MOCK_DATA.partidos.filter(esJugado).map(p => p.ID_Partido));
      return MOCK_DATA.eventos.some(e => e.Goleador === id && esAutogol(e) && ids.has(e.ID_Partido));

  },
  {
    titulo: "El Fantasma",

    }
  },
  {
    titulo: "El Caracol",
    glifo:  "caracol",

      return c.perd[id] === c.maxPerd;

];

function toggleBuscarPanel() {
  const panel = document.getElementById("buscar-panel");
  const toggle = document.getElementById("buscar-toggle");
  if (!panel) return;
  const abierto = panel.style.display !== "none";
  panel.style.display = abierto ? "none" : "block";
  toggle.classList.toggle("activo", !abierto);
}

function toggleChip(el) {
  const tipo = el.dataset.tipo;
  document.querySelectorAll(`#buscar-panel .buscar-chip[data-tipo="${tipo}"]`).forEach(c => c.classList.remove("activo"));
  if (!el.classList.contains("activo")) el.classList.add("activo");
  else el.classList.remove("activo");
  aplicarFiltros();
}

function aplicarFiltros() {
  const nombre  = normalizar((document.getElementById("buscar-nombre")?.value || "").trim().toLowerCase());
  const distEl  = document.querySelector('#buscar-panel .buscar-chip[data-tipo="dist"].activo');
  const emblEl  = document.querySelector('#buscar-panel .buscar-chip[data-tipo="embl"].activo');
  const dist    = distEl ? distEl.dataset.val : "";
  const embl    = emblEl ? emblEl.dataset.val : "";
  document.querySelectorAll("#jugadores-content .jugador-card").forEach(c => {
    const t = c.dataset.buscar || "";
    c.style.display = (!nombre || t.includes(nombre)) && (!dist || t.includes(dist)) && (!embl || t.includes(embl)) ? "" : "none";
  });
  const activos = [nombre, dist, embl].filter(Boolean).length;
  const badge   = document.getElementById("buscar-badge");
  const limpiar = document.getElementById("buscar-limpiar");
  if (badge)   { badge.style.display   = activos ? "inline-flex" : "none"; badge.textContent = activos; }
  if (limpiar) { limpiar.style.display = activos ? "" : "none"; }
}

// Próximo domingo: si hoy ES domingo (partido en curso), devuelve el siguiente.
// La convocatoria solo es vigente Mon–Sat de la semana del partido.
function proximoDomingo() {
  const hoy = new Date();
  const dia = hoy.getDay(); // 0=dom, 1=lun ... 6=sab
  const dias = dia === 0 ? 7 : 7 - dia;
  const d = new Date(hoy);
  d.setDate(hoy.getDate() + dias);
  return fechaISO(d);
}

// ---- Vista 1: Convocatoria ----
function renderConvocatoria() {
  const domingo = proximoDomingo();
  const fechaFmt = fmtFecha(domingo);
  const fechaCap = fechaFmt.charAt(0).toUpperCase() + fechaFmt.slice(1);
  document.getElementById("conv-fecha").textContent = fechaCap;

  const TIPOS_PARTIDO = ["Convocado", "Lista de espera", "Partido"];
  const relevantes = MOCK_DATA.asignacionPagos.filter(p => TIPOS_PARTIDO.includes(p.Tipo_Asignacion));
  const deLaFecha = relevantes.filter(p => p.Fecha_Asignacion === domingo);

  // Sin datos para el próximo domingo → estado de espera
  if (deLaFecha.length === 0) {
    document.getElementById("conv-desc").textContent = "A la espera de convocatoria para el partido del:";
    document.getElementById("label-convocados").textContent = "";
    document.getElementById("lista-convocados").innerHTML = `<p class="empty-msg">La convocatoria será publicada próximamente.</p>`;
    document.getElementById("label-espera").innerHTML = "";
    document.getElementById("lista-espera").innerHTML = "";
    FUENTES_AC["conv-player"] = [];
    return;
  }

  // Hay datos → convocatoria vigente
  document.getElementById("conv-desc").textContent = "Jugadores convocados para el partido del:";
  // "Convocado" → en convocatoria; "Lista de espera" → reserva;
  // "Partido" → ya fue asignado a una alineación (sale de esta vista)
  const convocados = deLaFecha.filter(p => p.Tipo_Asignacion === "Convocado");
  const espera = deLaFecha.filter(p => p.Tipo_Asignacion === "Lista de espera");
  const yaAsignados = deLaFecha.filter(p => p.Tipo_Asignacion === "Partido");

  // Sugerencias del buscador: los nombres vienen de la propia fila de
  // Finanzas (sus IDs no son compatibles con los de Estadísticas)
  FUENTES_AC["conv-player"] = [...convocados, ...espera]
    .map(p => p.Nombre_Jugador)
    .sort((a, b) => a.localeCompare(b, "es"));

  document.getElementById("label-espera").innerHTML =
    `Lista de espera <span class="count">(${espera.length})</span>`;

  // Convocados: si todos ya pasaron a una alineación → mensaje de cierre.
  // La lista de espera se muestra igual (aún entran si alguien se baja).
  if (!convocados.length && yaAsignados.length) {
    document.getElementById("label-convocados").textContent = "Convocatoria cerrada";
    document.getElementById("lista-convocados").innerHTML = `
      <div class="conv-cerrada">
        <p>Los ${yaAsignados.length} convocados ya fueron asignados a su equipo y alineación.</p>
        <button class="btn-ir-alineacion" onclick="irAVista('alineacion')">
          Ver la alineación →
        </button>
      </div>`;
  } else {
    document.getElementById("label-convocados").innerHTML =
      `Convocados <span class="count">(${convocados.length})</span>`;
    // Cuadrícula compacta (2 col en celular) para evitar scroll largo.
    // Nombre y avatar desde la fila de Finanzas; el perfil se enlaza por
    // nombre (si existe en Jugadores de Estadísticas).
    document.getElementById("lista-convocados").innerHTML =
      convocados.length
        ? `<div class="roster-grid">` + convocados.map(p => {
            const idEst = idPorNombre(p.Nombre_Jugador);
            return `
            <div class="roster-cell" data-nombre="${p.Nombre_Jugador}"
                 ${idEst ? `onclick="abrirPerfil('${idEst}')"` : ""}>
              <div class="avatar">${iniciales(p.Nombre_Jugador)}</div>
              <div class="rc-info">
                <div class="rc-name">${p.Nombre_Jugador}</div>
                <div class="rc-pos">${idEst ? posicion(idEst) : ""}</div>
              </div>
            </div>`;
          }).join("") + `</div>`
        : `<p class="empty-msg">Sin convocados aún.</p>`;
  }

  // Lista de espera: en orden de turno, con estilo de reserva
  document.getElementById("lista-espera").innerHTML =
    espera.length
      ? espera.map((p, i) => {
          const idEst = idPorNombre(p.Nombre_Jugador);
          return `
          <div class="espera-row" data-nombre="${p.Nombre_Jugador}"
               ${idEst ? `onclick="abrirPerfil('${idEst}')"` : ""}>
            <div class="espera-num">${i + 1}</div>
            <div class="avatar">${iniciales(p.Nombre_Jugador)}</div>
            <div class="rc-info">
              <div class="rc-name">${p.Nombre_Jugador}</div>
            </div>
          </div>`;
        }).join("")
      : `<p class="empty-msg">Nadie en lista de espera.</p>`;

  aplicarBusquedaConvocatoria();
}

// ---- Vista 2: Alineación (cancha) ----
// Formación 1-4-4-3 (12 jugadores por equipo). Si las posiciones reales
// no alcanzan, se rellena de abajo hacia arriba: arquero, defensa,
// mediocampista, delantero, con lo que haya disponible.
const FORMACION = [
  { pos: "Arquero",       cupo: 1 },
  { pos: "Defensa",       cupo: 4 },
  { pos: "Mediocampista", cupo: 4 },
  { pos: "Delantero",     cupo: 3 }
];

// Orden dentro de cada línea (izquierda → derecha). Menor número = más a la izquierda.
const POS_ORDER = {
  // Texto genérico (fallback)
  "Portero": 2, "Arquero": 2,
  "Lateral Izquierdo": 0, "Central": 2, "Defensa": 2, "Lateral Derecho": 4,
  "Mediocampista Izquierdo": 0, "Mediocampista": 2, "Mediocampista Derecho": 4,
  "Extremo Izquierdo": 0, "Delantero": 2, "Extremo Derecho": 4,
  // Siglas Tipo_Posicion
  "POR": 2,
  "LTI": 0, "CAI": 1, "DFC": 2, "CAD": 3, "LTD": 4,
  "MI":  0, "MCD": 1, "MC":  2, "MCO": 2, "MD":  4,
  "EI":  0, "SD":  1, "DC":  2, "MP":  3, "ED":  4
};

function lineasEquipo(ids, posiciones = {}) {
  const lineas = { Arquero: [], Defensa: [], Mediocampista: [], Delantero: [] };
  const sobrantes = [];
  ids.forEach(id => {
    const posId = posiciones[id]?.linea || posiciones[id] || posicion(id);
    const f = FORMACION.find(f => f.pos === posId);
    if (f && lineas[f.pos].length < f.cupo) lineas[f.pos].push(id);
    else sobrantes.push(id);
  });
  FORMACION.forEach(f => {
    while (lineas[f.pos].length < f.cupo && sobrantes.length) lineas[f.pos].push(sobrantes.shift());
  });
  // Más de 12: las líneas se amplían de abajo hacia arriba (desde defensa)
  let i = 1;
  while (sobrantes.length) { lineas[FORMACION[Math.min(i, 3)].pos].push(sobrantes.shift()); i++; }
  // Ordenar cada línea: jugadores CON sigla se ubican por POS_ORDER;
  // los SIN sigla se distribuyen a los lados para centrar a los que sí tienen sigla.
  Object.keys(lineas).forEach(linea => {
    const arr = lineas[linea];
    if (arr.length <= 1) return;

    const conSigla = arr.filter(id => posiciones[id]?.sigla)
      .sort((a, b) => POS_ORDER[posiciones[a].sigla] - POS_ORDER[posiciones[b].sigla]);
    const sinSigla = arr.filter(id => !posiciones[id]?.sigla);

    if (!conSigla.length) {
      arr.sort((a, b) => {
        const pA = POS_ORDER[posiciones[a]?.especifica] ?? POS_ORDER[posicion(a)] ?? 2;
        const pB = POS_ORDER[posiciones[b]?.especifica] ?? POS_ORDER[posicion(b)] ?? 2;
        return pA - pB;
      });
      return;
    }
    if (!sinSigla.length) { lineas[linea] = conSigla; return; }

    const hasLeft  = conSigla.some(id => POS_ORDER[posiciones[id].sigla] <= 1);
    const hasRight = conSigla.some(id => POS_ORDER[posiciones[id].sigla] >= 3);
    let leftFill, rightFill;
    if (!hasLeft && !hasRight) {
      const mid = Math.floor(sinSigla.length / 2);
      leftFill = sinSigla.slice(0, mid); rightFill = sinSigla.slice(mid);
    } else if (!hasLeft) {
      leftFill = sinSigla; rightFill = [];
    } else {
      leftFill = []; rightFill = sinSigla;
    }
    lineas[linea] = [...leftFill, ...conSigla, ...rightFill];
  });
  return lineas;
}

function nombreCorto(id) {
  const partes = nombre(id).split(" ");
  return partes.length > 1 ? `${partes[0]} ${partes[partes.length - 1]}` : partes[0];
}
function nombreDosLineas(id) {
  const partes = nombre(id).split(" ");
  if (partes.length < 2) return `<span class="n-nombre">${partes[0]}</span>`;
  return `<span class="n-nombre">${partes[0]}</span><span class="n-ape">${partes[partes.length - 1]}</span>`;
}


function pitchHTML(ids, team, partido, posiciones = {}, capitanes = {}, ausentes = new Set(), difs = new Set()) {
  const l = lineasEquipo(ids, posiciones);
  const chip = id => {
    const posEsp = posiciones[id]?.sigla || posiciones[id]?.especifica || posicion(id);
    const esCap = !!capitanes[id];
    const esPortero = (posiciones[id]?.linea || posicion(id)) === "Arquero";
    const esAusente = ausentes.has(id);
    const esDif = difs.has(id);
    return `
    <div class="pitch-player ${esCap ? "is-capitan" : ""} ${esAusente ? "ausente" : ""} ${esDif ? "is-dif" : ""}" data-id="${id}" onclick="abrirPerfil('${id}')">
      ${esCap ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="cap-corona-svg" aria-hidden="true"><path fill="#C9A84C" d="M384,167L256,51.1L128,167L0,98.6v274.5h512V98.6L384,167z"/><rect fill="#C9A84C" y="411.8" width="512" height="49.1"/></svg>` : ""}
      ${esDif ? `<svg viewBox="0 0 24 24" class="dif-rayo-svg" aria-hidden="true" fill="#2cc4b4"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>` : ""}
      <div class="avatar ${esPortero ? "portero" : team}">${iniciales(nombre(id))}</div>
      <div class="pp-name">${nombreDosLineas(id)}</div>
      <div class="pp-pos-badge">${posEsp}</div>
    </div>`;
  };
  const fila = arr => `<div class="p-line">${arr.map(chip).join("")}</div>`;
  return `
    <div class="pitch ${team}">
      <div class="pl-outer"></div><div class="pl-circle"></div>
      <div class="pl-box"></div><div class="pl-box-in"></div>
      <div class="pitch-rows">
        ${fila(l.Delantero)}
        ${fila(l.Mediocampista)}
        ${fila(l.Defensa)}
        ${fila(l.Arquero)}
      </div>
    </div>`;
}

// Alineaciones con su partido, de la más reciente a la más antigua.
// Por defecto se muestra la primera: la futura si ya fue publicada,
// si no, la del último partido jugado.
let aliSeleccion = null; // ID_Partido elegido en el selector

function listaAlineaciones() {
  return MOCK_DATA.alineaciones
    .map(a => ({ ali: a, partido: MOCK_DATA.partidos.find(p => p.ID_Partido === a.ID_Partido) }))
    .filter(x => x.partido)
    .sort((a, b) => b.partido.Fecha.localeCompare(a.partido.Fecha));
}

function renderAlineacion() {
  const lista = listaAlineaciones();
  if (!lista.length) {
    document.getElementById("alineacion-grid").innerHTML = `<p class="empty-msg">Aún no hay alineaciones registradas.</p>`;
    return;
  }
  const sel = lista.find(x => x.ali.ID_Partido === aliSeleccion) || lista[0];
  aliSeleccion = sel.ali.ID_Partido;
  const p = sel.partido;
  const jugado = esJugado(p);

  // Cabecera: estado + fecha grande, sin lugar a confusión
  const status = document.getElementById("ali-status");
  status.textContent = jugado ? "Partido jugado" : "Próximo partido";
  status.className = "ali-status " + (jugado ? "pasado" : "proximo");
  const fecha = fmtFecha(p.Fecha);
  document.getElementById("ali-fecha").textContent = fecha.charAt(0).toUpperCase() + fecha.slice(1);
  // Si lo más reciente que existe es un partido pasado, avisar que la
  // alineación del próximo aún no se publica
  document.getElementById("ali-note").textContent =
    (jugado && sel === lista[0])
      ? "La alineación del próximo partido aún no se publica (sale el sábado)."
      : "";

  // Selector de fechas custom
  const csList = document.getElementById("ali-select-list");
  const csLabel = document.getElementById("ali-select-label");
  csList.innerHTML = lista.map(x => {
    const marcador = esJugado(x.partido)
      ? `Rojo ${x.partido.Goles_Rojo}-${x.partido.Goles_Azul} Azul`
      : "Próximo partido";
    const etiqueta = `${fmtFechaCorta(x.partido.Fecha)} · ${marcador}`;
    const sel = x.ali.ID_Partido === aliSeleccion ? " selected" : "";
    return `<div class="cs-item${sel}" data-id="${x.ali.ID_Partido}">${etiqueta}</div>`;
  }).join("");
  const selItem = csList.querySelector(".cs-item.selected") || csList.querySelector(".cs-item");
  if (selItem) csLabel.textContent = selItem.textContent;

  // Sugerencias del buscador con los jugadores de esta alineación
  FUENTES_AC["ali-player"] = [...sel.ali.Rojo, ...sel.ali.Azul]
    .sort((a, b) => nombre(a).localeCompare(nombre(b), "es"))
    .map(nombre);

  // Marcador (solo si ya se jugó); para el próximo, ROJO vs AZUL
  document.getElementById("alineacion-score").innerHTML = `
    <div class="score-line">
      <span class="score-team rojo">Rojo</span>
      <span class="score-nums">${jugado ? `${p.Goles_Rojo} — ${p.Goles_Azul}` : "vs"}</span>
      <span class="score-team azul">Azul</span>
    </div>
    ${jugado ? golesPartidoHTML(p) : ""}
  `;

  const difsSet = new Set(sel.ali.Diferenciadores || []);
  document.getElementById("alineacion-grid").innerHTML = `
    <div class="card team-card">
      <div class="team-head rojo">Equipo Rojo</div>
      ${pitchHTML(sel.ali.Rojo, "rojo", p, sel.ali.Posiciones || {}, sel.ali.Capitanes || {}, new Set(sel.ali.Ausentes || []), difsSet)}
    </div>
    <div class="card team-card">
      <div class="team-head azul">Equipo Azul</div>
      ${pitchHTML(sel.ali.Azul, "azul", p, sel.ali.Posiciones || {}, sel.ali.Capitanes || {}, new Set(sel.ali.Ausentes || []), difsSet)}
    </div>`;

  aplicarBusquedaAlineacion();
}
